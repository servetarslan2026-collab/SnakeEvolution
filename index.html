<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Rajdhani',sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// =====================================================
// SNAKE EVOLUTION v3 — Tüm Düzeltmeler
// =====================================================
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:false});
const W=800,H=600,GS=20;
const COLS=W/GS,ROWS=H/GS;
const PI2=Math.PI*2;

function resize(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  canvas.width=W*s|0; canvas.height=H*s|0;
  canvas.style.width=W*s+'px'; canvas.style.height=H*s+'px';
  ctx.setTransform(s,0,0,s,0,0);
}
resize(); addEventListener('resize',resize);

// =====================================================
// DURUM
// =====================================================
let state='menu';
let score=0,level=1,xp=0,xpNext=30;
let combo=0,comboTimer=0,comboMult=1;
let shakeX=0,shakeY=0,shakeTimer=0;
let flashColor=null,flashTimer=0;
let gameTime=0,particles=[],notifications=[];
let upgrades=[],hp=4,maxHp=4,invTimer=0;
let bossActive=null;
let enemies=[],enemySpawnTimer=0;
let selectedBtn=0,selectedUpgrade=0,upgradeChoices=[];
let deadTimer=0,foodTimer=0;
let foods=[],tiles=[];
let howToPlayPage=0;

// Yılan
let snake=[];
let snakeRender=[]; // Interpolasyon için render pozisyonları
let dir={x:0,y:-1},nextDir={x:0,y:-1};
let moveTimer=0,speed=4,startDelay=0;

// Düşman render pozisyonları
let enemyRender=[];

// =====================================================
// RENKLER
// =====================================================
const C={
  bg:'#06060f',grid:'#0c0c1e',gridA:'#121230',
  wall:'#14142e',wallG:'#1e1e48',
  accent:'#00ffd5',accent2:'#ff2d95',accent3:'#ffe14d',
  lava:'#ff3d00',ice:'#00d4ff',bush:'#003828',
  electric:'#ffe14d',portal:'#b44dff'
};

// =====================================================
// YARDIMCI
// =====================================================
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return rnd(a,b+1)|0}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return v<a?a:v>b?b:v}

// =====================================================
// PARÇACIK
// =====================================================
function emit(x,y,vx,vy,life,sz,col){
  if(particles.length>150)return;
  particles.push({x,y,vx,vy,life,ml:life,sz,col:col||C.accent});
}
function burst(x,y,col,n){
  for(let i=0;i<(n||6);i++){
    const a=rnd(0,PI2),s=rnd(30,80);
    emit(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.2,0.4),rnd(2,3),col);
  }
}
function floatText(x,y,txt,col){
  particles.push({x,y,vx:0,vy:-40,life:0.6,ml:0.6,sz:14,col,txt,shape:'text'});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.95; p.vy*=0.95; p.vy+=30*dt;
  }
}
function drawParticles(){
  for(const p of particles){
    const a=p.life/p.ml;
    ctx.globalAlpha=a; ctx.fillStyle=p.col;
    if(p.shape==='text'){
      ctx.font='bold '+p.sz+'px Orbitron'; ctx.textAlign='center';
      ctx.fillText(p.txt,p.x|0,p.y|0);
    } else {
      const s=p.sz*a;
      ctx.fillRect((p.x-s/2)|0,(p.y-s/2)|0,s|0,s|0);
    }
  }
  ctx.globalAlpha=1;
}

// =====================================================
// BİLDİRİMLER
// =====================================================
function notify(t,c){if(notifications.length<4)notifications.push({t,c:c||'#fff',tm:2.5})}
function updateNotifications(dt){for(let i=notifications.length-1;i>=0;i--){notifications[i].tm-=dt;if(notifications[i].tm<=0)notifications.splice(i,1)}}
function drawNotifications(){
  let y=95;
  for(const n of notifications){
    ctx.globalAlpha=Math.min(1,n.tm); ctx.fillStyle=n.c;
    ctx.font='bold 15px Rajdhani'; ctx.textAlign='center';
    ctx.fillText(n.t,W/2|0,y); y+=22;
  }
  ctx.globalAlpha=1;
}

// =====================================================
// HARİTA + TILE EFEKTLERİ
// =====================================================
function genMap(){
  tiles=[];
  for(let y=0;y<ROWS;y++){
    tiles[y]=new Uint8Array(COLS);
    for(let x=0;x<COLS;x++){
      if(x===0||x===COLS-1||y===0||y===ROWS-1)tiles[y][x]=1;
    }
  }
  // Engeller (daha az, daha anlamlı)
  for(let i=0;i<4;i++){
    const x=rndInt(4,COLS-5),y=rndInt(4,ROWS-5);
    tiles[y][x]=rndInt(2,4);
  }
  // Spawn bölgesini temizle
  const cx=COLS/2|0,cy=ROWS/2|0;
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
    const nx=cx+dx,ny=cy+dy;
    if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1)tiles[ny][nx]=0;
  }
}

// Tile efektleri
let tileEffectTimer=0;
let iceDir=null; // Buz üzerinde kayma yönü

function checkTileEffects(dt){
  if(snake.length===0) return;
  const head=snake[0];
  const tile=tiles[head.y]?tiles[head.y][head.x]:0;
  
  tileEffectTimer+=dt;
  
  if(tile===3 && tileEffectTimer>1.5){ // LAVA - periyodik hasar
    tileEffectTimer=0;
    takeDamage(1,'lava');
  }
  if(tile===4){ // BUZ - kayma (yön değişimi zor)
    iceDir={...dir}; // Mevcut yönü koru
  } else {
    iceDir=null;
  }
  if(tile===5){ // ÇALI - yavaşlatma (şimdilik yok, eklenebilir)
    // speed multiplier
  }
  if(tile===7 && tileEffectTimer>2){ // ELEKTRİK - periyodik hasar
    tileEffectTimer=0;
    takeDamage(1,'electric');
  }
}

function takeDamage(amount,source){
  if(invTimer>0) return;
  hp-=amount;
  shake(5,0.3);
  flash('#ff0044',0.2);
  burst(snake[0].x*GS+GS/2,snake[0].y*GS+GS/2,'#ff4444',8);
  playTone(200,0.15);
  
  if(hp<=0){
    die(source||'unknown');
  } else {
    invTimer=1.5; // Kısa dokunulmazlık
    notify('⚠️ -'+amount+' HP','#ff4444');
  }
}

function drawMap(){
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=tiles[y][x]; if(t===0)continue;
    const px=x*GS,py=y*GS;
    if(t===1){ // DUVAR
      ctx.fillStyle=C.wall; ctx.fillRect(px,py,GS,GS);
      ctx.strokeStyle=C.wallG; ctx.lineWidth=0.5;
      ctx.strokeRect(px+.5,py+.5,GS-1,GS-1);
    } else if(t===2){ // KAYA
      ctx.fillStyle='#3a3a4a'; ctx.fillRect(px+2,py+2,GS-4,GS-4);
      ctx.fillStyle='#4a4a5a'; ctx.fillRect(px+3,py+3,GS-6,GS-6);
    } else if(t===3){ // LAVA
      const tt=Date.now()/500;
      ctx.fillStyle=C.lava; ctx.fillRect(px,py,GS,GS);
      ctx.fillStyle='#ff880044';
      ctx.fillRect(px+3+Math.sin(tt)*2,py+3+Math.cos(tt)*2,GS-6,GS-6);
    } else if(t===4){ // BUZ
      ctx.fillStyle=C.ice+'33'; ctx.fillRect(px,py,GS,GS);
      ctx.strokeStyle=C.ice+'66'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(px+GS/2,py+2); ctx.lineTo(px+GS-2,py+GS/2);
      ctx.lineTo(px+GS/2,py+GS-2); ctx.lineTo(px+2,py+GS/2);
      ctx.closePath(); ctx.stroke();
    } else if(t===5){ // ÇALI
      ctx.fillStyle=C.bush; ctx.fillRect(px+1,py+1,GS-2,GS-2);
    } else if(t===7){ // ELEKTRİK
      ctx.fillStyle='#1a1a00'; ctx.fillRect(px,py,GS,GS);
      ctx.strokeStyle=C.electric; ctx.lineWidth=1.5;
      const et=Date.now()/150;
      ctx.beginPath(); ctx.moveTo(px,py+GS/2);
      for(let i=0;i<4;i++){
        ctx.lineTo(px+(i+.5)*(GS/4),py+GS/2+Math.sin(et+i*2)*4);
      }
      ctx.lineTo(px+GS,py+GS/2); ctx.stroke();
    }
  }
}

// =====================================================
// YEM
// =====================================================
const FOOD_TYPES=[
  {type:'normal',color:'#ff2244',w:45,sc:1,len:1,xp:0,hp:0,icon:'🍎'},
  {type:'golden',color:'#ffaa00',w:12,sc:5,len:2,xp:0,hp:0,icon:'⭐'},
  {type:'crystal',color:'#aa44ff',w:10,sc:0,len:0,xp:20,hp:0,icon:'💎'},
  {type:'heart',color:'#ff44aa',w:10,sc:0,len:0,xp:0,hp:1,icon:'❤️'},
  {type:'clock',color:'#4488ff',w:6,sc:0,len:0,xp:0,hp:0,icon:'⏱️'},
  {type:'magnet',color:'#00ffcc',w:5,sc:0,len:0,xp:0,hp:0,icon:'🧲'},
  {type:'star',color:'#ffffff',w:4,sc:0,len:0,xp:0,hp:0,icon:'✨'},
  {type:'coin',color:'#ffcc00',w:8,sc:2,len:0,xp:0,hp:0,icon:'🪙'}
];

function pickFood(){
  let r=Math.random()*100;
  for(const f of FOOD_TYPES){r-=f.w;if(r<=0)return f.type;}
  return 'normal';
}

function spawnFood(){
  if(foods.length>=8)return;
  const type=pickFood();
  const def=FOOD_TYPES.find(f=>f.type===type);
  let x,y,tr=0;
  do{x=rndInt(2,COLS-3);y=rndInt(2,ROWS-3);tr++}
  while(tiles[y]&&tiles[y][x]!==0&&tr<30);
  if(tr>=30)return;
  foods.push({x,y,type,...def,anim:rnd(0,6.28),alive:true});
}

function drawFood(){
  const now=Date.now();
  for(const f of foods){
    if(!f.alive)continue;
    const cx=f.x*GS+GS/2,cy=f.y*GS+GS/2;
    const pulse=Math.sin(now/300+f.anim)*0.1+1;
    const sz=(GS/2-1)*pulse;
    
    // Dış glow
    ctx.fillStyle=f.color+'33';
    ctx.beginPath(); ctx.arc(cx,cy,sz+3,0,PI2); ctx.fill();
    
    // Ana daire
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,f.color); g.addColorStop(1,f.color+'88');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,sz,0,PI2); ctx.fill();
    
    // Emoji
    ctx.font=(sz*.65|0)+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.icon,cx,cy);
  }
}

// =====================================================
// YILAN (interpolasyonlu)
// =====================================================
function initSnake(){
  const cx=COLS/2|0,cy=ROWS/2|0;
  snake=[{x:cx,y:cy},{x:cx,y:cy+1},{x:cx,y:cy+2}];
  snakeRender=snake.map(s=>({x:s.x,y:s.y}));
  dir={x:0,y:-1}; nextDir={x:0,y:-1};
  moveTimer=0; speed=4; hp=4; maxHp=4; invTimer=2;
  startDelay=0.5;
  tileEffectTimer=0;
}

function updateSnake(dt){
  if(startDelay>0){startDelay-=dt;return;}
  
  // Interpolasyon: render pozisyonlarını gerçek pozisyona yaklaştır
  for(let i=0;i<snake.length;i++){
    if(snakeRender[i]){
      snakeRender[i].x=lerp(snakeRender[i].x,snake[i].x,Math.min(1,dt*12));
      snakeRender[i].y=lerp(snakeRender[i].y,snake[i].y,Math.min(1,dt*12));
    }
  }
  
  moveTimer+=dt;
  const interval=1/speed;
  while(moveTimer>=interval){
    moveTimer-=interval;
    
    // Buz üzerindeyken yön değişimi engelle
    if(!iceDir){
      if(dir.x!==-nextDir.x||dir.y!==-nextDir.y)dir={...nextDir};
    }
    
    const head=snake[0];
    let nx=head.x+dir.x,ny=head.y+dir.y;
    
    // Duvar kontrolü
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS||(tiles[ny]&&tiles[ny][nx]===1)){
      if(invTimer>0)continue;
      die('wall'); return;
    }
    
    // Kuyruk kontrolü
    if(invTimer<=0){
      for(let i=1;i<snake.length;i++){
        if(snake[i].x===nx&&snake[i].y===ny){die('self');return;}
      }
    }
    
    // Hareket
    snake.unshift({x:nx,y:ny});
    snakeRender.unshift({x:snakeRender[0]?snakeRender[0].x:nx,y:snakeRender[0]?snakeRender[0].y:ny});
    while(snake.length>3+level){snake.pop();snakeRender.pop();}
    
    // Yem kontrolü
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];
      if(f.alive&&f.x===nx&&f.y===ny){
        collectFood(f);
        foods.splice(i,1);
      }
    }
  }
  
  // Tile efektleri
  checkTileEffects(dt);
  
  // Invincibility
  if(invTimer>0)invTimer-=dt;
  
  // Combo timer
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1;}}
}

function drawSnake(){
  const now=Date.now();
  const len=snake.length;
  if(len===0)return;
  
  for(let i=len-1;i>=0;i--){
    const s=snakeRender[i]||snake[i];
    const px=s.x*GS+GS/2,py=s.y*GS+GS/2;
    const segT=i/Math.max(1,len-1);
    const sz=(GS/2-2)*(1-segT*0.25);
    
    ctx.save();
    if(invTimer>0&&(now/100|0)%2===0)ctx.globalAlpha=0.4;
    
    if(i===0){
      // KAFA
      const g=ctx.createRadialGradient(px-3,py-3,1,px,py,sz+2);
      g.addColorStop(0,'#66ffdd'); g.addColorStop(0.7,C.accent); g.addColorStop(1,'#008866');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(px,py,sz+2,0,PI2); ctx.fill();
      
      // Highlight
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(px-4,py-4,sz*0.3,0,PI2); ctx.fill();
      
      // Gözler
      const eo=sz*0.35,es=sz*0.22;
      const lx=px+dir.x*3-dir.y*eo,ly=py+dir.y*3+dir.x*eo;
      const rx=px+dir.x*3+dir.y*eo,ry=py+dir.y*3-dir.x*eo;
      
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(lx,ly,es+2,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx,ry,es+2,0,PI2);ctx.fill();
      
      ctx.fillStyle=C.accent;
      ctx.beginPath();ctx.arc(lx+dir.x*1.5,ly+dir.y*1.5,es*0.7,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx+dir.x*1.5,ry+dir.y*1.5,es*0.7,0,PI2);ctx.fill();
      
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(lx+dir.x*2.5,ly+dir.y*2.5,es*0.4,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx+dir.x*2.5,ry+dir.y*2.5,es*0.4,0,PI2);ctx.fill();
      
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();ctx.arc(lx-1,ly-1,es*0.2,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx-1,ry-1,es*0.2,0,PI2);ctx.fill();
      
    } else {
      // GÖVDE
      const g=ctx.createRadialGradient(px-2,py-2,0,px,py,sz);
      g.addColorStop(0,'#44ddbb'); g.addColorStop(1,'#00aa88');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(px,py,sz,0,PI2); ctx.fill();
      
      if(i%2===0){
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath(); ctx.arc(px-1,py-1,sz*0.4,0,PI2); ctx.fill();
      }
    }
    ctx.restore();
  }
}

// =====================================================
// DÜŞMANLAR (interpolasyonlu, hasar sistemi)
// =====================================================
function spawnEnemy(){
  const types=['bug','chaser','ghost'];
  const type=types[rndInt(0,2)];
  let x,y,tr=0;
  do{x=rndInt(3,COLS-4);y=rndInt(3,ROWS-4);tr++}
  while((tiles[y]&&tiles[y][x]!==0||dist(x,y,snake[0].x,snake[0].y)<10)&&tr<30);
  if(tr>=30)return;
  const d={bug:{sp:2,hp:2,col:'#ff2244'},chaser:{sp:3,hp:2,col:'#ff4444'},ghost:{sp:1.5,hp:999,col:'#aaaaff'}}[type];
  const e={x,y,type,...d,alive:true,mt:0,anim:0,dir:{x:0,y:-1},rx:x,ry:y};
  enemies.push(e);
}

function updateEnemies(dt){
  enemySpawnTimer+=dt;
  if(enemySpawnTimer>=10&&enemies.length<3){enemySpawnTimer=0;spawnEnemy();}
  
  for(const e of enemies){
    if(!e.alive)continue;
    e.anim+=dt;
    
    // Interpolasyon
    e.rx=lerp(e.rx,e.x,Math.min(1,dt*10));
    e.ry=lerp(e.ry,e.y,Math.min(1,dt*10));
    
    e.mt+=dt;
    if(e.mt>=1/e.sp){
      e.mt=0;
      if(e.type==='chaser'){
        const dx=snake[0].x-e.x,dy=snake[0].y-e.y;
        if(Math.abs(dx)>Math.abs(dy))e.dir={x:dx>0?1:-1,y:0};
        else e.dir={x:0,y:dy>0?1:-1};
      }else if(e.type==='bug'&&Math.random()<0.3){
        e.dir=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}][rndInt(0,3)];
      }
      let nx=e.x+e.dir.x,ny=e.y+e.dir.y;
      if(e.type==='ghost'){nx=((nx%COLS)+COLS)%COLS;ny=((ny%ROWS)+ROWS)%ROWS;}
      else if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1||(tiles[ny]&&tiles[ny][nx]===1))continue;
      e.x=nx;e.y=ny;
    }
    
    // Oyuncu çarpışma (hasar sistemi, anında ölüm değil)
    if(invTimer<=0 && dist(snake[0].x,snake[0].y,e.x,e.y)<1.5){
      takeDamage(1,'enemy');
      // Düşmanı geri it
      e.x+=e.dir.x*-3; e.y+=e.dir.y*-3;
      e.rx=e.x; e.ry=e.y;
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    const cx=e.rx*GS+GS/2,cy=e.ry*GS+GS/2,sz=GS/2-2;
    ctx.save();
    if(e.type==='ghost')ctx.globalAlpha=0.4+Math.sin(e.anim*3)*0.2;
    
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,e.col); g.addColorStop(1,e.col+'88');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,sz*0.8,0,PI2); ctx.fill();
    
    // Gözler
    ctx.fillStyle='#f00';
    ctx.beginPath();ctx.arc(cx-3,cy-3,2,0,PI2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,cy-3,2,0,PI2);ctx.fill();
    ctx.restore();
  }
}

// =====================================================
// BOSS
// =====================================================
function spawnBoss(){
  bossActive={x:COLS/2|0,y:5,hp:15+level*3,maxHp:15+level*3,color:C.accent2,name:'BOSS',anim:0,rx:COLS/2|0,ry:5};
  notify('⚠️ BOSS GELİYOR!','#ff0044');
}

function updateBoss(dt){
  if(!bossActive)return;
  bossActive.anim+=dt;
  
  // Basit AI: oyuncuya doğru hareket
  const dx=snake[0].x-bossActive.x,dy=snake[0].y-bossActive.y;
  bossActive.x+=Math.sign(dx)*dt*1.5;
  bossActive.y+=Math.sign(dy)*dt*1.5;
  
  // Interpolasyon
  bossActive.rx=lerp(bossActive.rx,bossActive.x,Math.min(1,dt*8));
  bossActive.ry=lerp(bossActive.ry,bossActive.y,Math.min(1,dt*8));
  
  // Sınır kontrolü
  bossActive.x=clamp(bossActive.x,2,COLS-3);
  bossActive.y=clamp(bossActive.y,2,ROWS-3);
  
  // Çarpışma
  if(invTimer<=0&&dist(snake[0].x,snake[0].y,Math.round(bossActive.x),Math.round(bossActive.y))<2){
    takeDamage(1,'boss');
  }
}

function hitBoss(dmg){
  if(!bossActive)return;
  bossActive.hp-=dmg;
  burst(bossActive.rx*GS+GS/2,bossActive.ry*GS+GS/2,bossActive.color,6);
  if(bossActive.hp<=0){
    burst(bossActive.rx*GS+GS/2,bossActive.ry*GS+GS/2,'#ffaa00',20);
    notify('🏆 BOSS YENİLDİ! +50 Skor','#ffaa00');
    bossActive=null; score+=50;
    playTone(800,0.2);
  }
}

function drawBoss(){
  if(!bossActive)return;
  const cx=bossActive.rx*GS+GS/2,cy=bossActive.ry*GS+GS/2,sz=GS*1.3;
  ctx.save();
  
  const g=ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,sz);
  g.addColorStop(0,'#ff88aa'); g.addColorStop(0.5,bossActive.color); g.addColorStop(1,'#880022');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(cx,cy,sz,0,PI2); ctx.fill();
  
  // Desen
  ctx.strokeStyle=bossActive.color+'44'; ctx.lineWidth=2;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc(cx,cy,sz*(0.3+i*0.2),bossActive.anim+i*2,bossActive.anim+i*2+4);
    ctx.stroke();
  }
  
  // Gözler
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,6,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,6,0,PI2);ctx.fill();
  ctx.fillStyle=bossActive.color;
  ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,3,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,3,0,PI2);ctx.fill();
  
  // HP bar
  const bw=GS*5,bh=8,bx=cx-bw/2,by=cy-sz-15;
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#ff0044'; ctx.fillRect(bx,by,bw*(bossActive.hp/bossActive.maxHp),bh);
  ctx.fillStyle='#fff'; ctx.font='bold 11px Orbitron'; ctx.textAlign='center';
  ctx.fillText('BOSS',cx,by-4);
  ctx.restore();
}

function collectFood(f){
  combo++; comboTimer=2.5;
  comboMult=combo>=12?10:combo>=8?5:combo>=5?3:combo>=3?2:1;
  
  const scoreGain=(f.sc||0)*comboMult;
  score+=scoreGain;
  xp+=(f.xp||0);
  
  if(f.len>0)for(let i=0;i<f.len;i++){
    snake.push({...snake[snake.length-1]});
    snakeRender.push({...snakeRender[snakeRender.length-1]});
  }
  if(f.hp>0)hp=Math.min(hp+f.hp,maxHp);
  if(bossActive)hitBoss(1);
  
  const cx=f.x*GS+GS/2,cy=f.y*GS+GS/2;
  burst(cx,cy,f.color,6);
  if(scoreGain>0)floatText(cx,cy-10,'+'+scoreGain,f.color);
  if(f.xp>0)floatText(cx,cy-25,'+'+f.xp+' XP','#aa44ff');
  if(f.hp>0)floatText(cx,cy-25,'+'+f.hp+' HP','#ff44aa');
  
  // Level up
  if(xp>=xpNext){
    xp-=xpNext; level++;
    xpNext=Math.floor(xpNext*1.15);
    speed=Math.min(12,4+level*0.3);
    showUpgradeScreen();
  }
  
  // Combo efekt
  if(combo>=3){shake(2,0.1);}
  
  // Boss spawn (her 5 levelde)
  if(level>1 && level%5===0 && !bossActive && xp>=xpNext-5){
    spawnBoss();
  }
  
  playTone(440+combo*15,0.06);
}

function die(reason){
  state='dead'; hp=0; deadTimer=0;
  shake(8,0.4); flash('#ff0044',0.3);
  for(const s of snake)burst(s.x*GS+GS/2,s.y*GS+GS/2,C.accent,5);
  playTone(200,0.25);
}

let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(f,d){
  if(!actx)return;
  try{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d);
  }catch(e){}
}

// =====================================================
// EFEKTLER
// =====================================================
function shake(i,d){shakeX=i;shakeY=i;shakeTimer=d;}
function flash(c,d){flashColor=c;flashTimer=d;}
function updateEffects(dt){
  if(shakeTimer>0){shakeTimer-=dt;const t=shakeTimer;shakeX=(Math.random()-.5)*shakeX*2*t;shakeY=(Math.random()-.5)*shakeY*2*t;}
  else{shakeX=0;shakeY=0;}
  if(flashTimer>0)flashTimer-=dt;
}

// =====================================================
// INPUT
// =====================================================
addEventListener('keydown',e=>{
  const c=e.code;
  
  // Yön tuşları (her durumda)
  if(c==='ArrowUp'||c==='KeyW'){
    e.preventDefault();
    if(state==='play')nextDir={x:0,y:-1};
    if(state==='menu')selectedBtn=(selectedBtn-1+3)%3;
    if(state==='howtoplay')howToPlayPage=Math.max(0,howToPlayPage-1);
  }
  if(c==='ArrowDown'||c==='KeyS'){
    e.preventDefault();
    if(state==='play')nextDir={x:0,y:1};
    if(state==='menu')selectedBtn=(selectedBtn+1)%3;
    if(state==='howtoplay')howToPlayPage=Math.min(2,howToPlayPage+1);
  }
  if(c==='ArrowLeft'||c==='KeyA'){
    e.preventDefault();
    if(state==='play')nextDir={x:-1,y:0};
    if(state==='levelup')selectedUpgrade=(selectedUpgrade-1+3)%3;
    if(state==='howtoplay')howToPlayPage=Math.max(0,howToPlayPage-1);
  }
  if(c==='ArrowRight'||c==='KeyD'){
    e.preventDefault();
    if(state==='play')nextDir={x:1,y:0};
    if(state==='levelup')selectedUpgrade=(selectedUpgrade+1)%3;
    if(state==='howtoplay')howToPlayPage=Math.min(2,howToPlayPage+1);
  }
  
  // Enter/Space
  if(c==='Enter'||c==='Space'){
    e.preventDefault(); initAudio();
    if(state==='menu'){
      if(selectedBtn===0)startGame();
      else if(selectedBtn===1){state='howtoplay';howToPlayPage=0;}
      else if(selectedBtn===2){state='settings';}
    }
    if(state==='dead')startGame();
    if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    if(state==='howtoplay')state='menu';
    if(state==='settings')state='menu';
  }
  
  // Escape
  if(c==='Escape'){
    if(state==='play')state='menu';
    else if(state==='dead')state='menu';
    else if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    else if(state==='howtoplay')state='menu';
    else if(state==='settings')state='menu';
  }
  
  // Level up数字 tuşları
  if(state==='levelup'){
    if(c==='Digit1'){applyUpgrade(upgradeChoices[0]);state='play';}
    if(c==='Digit2'){applyUpgrade(upgradeChoices[1]);state='play';}
    if(c==='Digit3'){applyUpgrade(upgradeChoices[2]);state='play';}
  }
});

// Dokunmatik
let touchStart=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,time:Date.now()}},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault(); if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y,d=Math.hypot(dx,dy);
  if(d<15){
    if(state==='menu'){if(selectedBtn===0)startGame();else if(selectedBtn===1){state='howtoplay';howToPlayPage=0;}else if(selectedBtn===2){state='settings';}}
    if(state==='dead')startGame();
    if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    if(state==='howtoplay'||state==='settings')state='menu';
  }else if(d>30){
    if(state==='play'){
      if(Math.abs(dx)>Math.abs(dy))nextDir={x:dx>0?1:-1,y:0};
      else nextDir={x:0,y:dy>0?1:-1};
    }
  }
  touchStart=null;
},{passive:false});

// ANA DÖNGÜ
// =====================================================
function startGame(){
  state='play'; score=0; level=1; xp=0; xpNext=30;
  combo=0; comboTimer=0; comboMult=1;
  gameTime=0; upgrades=[]; enemies=[]; enemySpawnTimer=0;
  bossActive=null; foods=[]; particles=[]; notifications=[];
  startDelay=0.5; tileEffectTimer=0;
  genMap(); initSnake();
  for(let i=0;i<6;i++)spawnFood();
  notify('🎮 Başla! WASD/Ok ile hareket','#00ffcc');
}

let lastTime=0,fpsCounter=0,fpsTime=0,currentFps=0;

function loop(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  
  fpsCounter++;
  if(now-fpsTime>=1000){currentFps=fpsCounter;fpsCounter=0;fpsTime=now;}
  
  // GÜNCELLE
  if(state==='play'){
    gameTime+=dt;
    updateSnake(dt);
    updateEnemies(dt);
    updateBoss(dt);
    foodTimer+=dt;
    if(foodTimer>=2){foodTimer=0;spawnFood();}
    
    // Mıknatıs
    if(upgrades.includes('magnet')&&snake.length>0){
      for(const f of foods){
        if(!f.alive)continue;
        const d=dist(snake[0].x,snake[0].y,f.x,f.y);
        if(d<5&&d>0.5){const a=Math.atan2(snake[0].y-f.y,snake[0].x-f.x);f.x+=Math.cos(a)*0.15;f.y+=Math.sin(a)*0.15;}
      }
    }
  }
  
  updateParticles(dt);
  updateEffects(dt);
  updateNotifications(dt);
  
  // ÇİZ
  ctx.save();
  const s=Math.min(innerWidth/W,innerHeight/H);
  ctx.setTransform(s,0,0,s,0,0);
  
  // Arka plan
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  
  // Grid
  ctx.strokeStyle=C.grid; ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  
  ctx.translate(shakeX,shakeY);
  
  switch(state){
    case 'menu': drawMenu(); break;
    case 'play': drawMap();drawFood();drawEnemies();drawBoss();drawSnake();drawParticles();drawHUD(); break;
    case 'dead': drawMap();drawParticles();drawDead(); break;
    case 'levelup': drawMap();drawFood();drawSnake();drawParticles();drawHUD();drawLevelUp(); break;
    case 'howtoplay': drawHowToPlay(); break;
    case 'settings': drawSettings(); break;
  }
  
  drawNotifications();
  
  if(flashTimer>0&&flashColor){ctx.globalAlpha=flashTimer;ctx.fillStyle=flashColor;ctx.fillRect(-20,-20,W+40,H+40);ctx.globalAlpha=1;}
  
  ctx.restore();
  requestAnimationFrame(loop);
}

  const items=[{l:'SKOR',v:score,c:C.accent},{l:'SÜRE',v:Math.floor(gameTime)+'s',c:'#888899'},{l:'LEVEL',v:level,c:'#ffaa00'},{l:'COMBO',v:'x'+combo,c:'#ffaa00'}];
  let y=150;
  for(const it of items){
    ctx.fillStyle='#556677'; ctx.font='11px Orbitron'; ctx.textAlign='right'; ctx.fillText(it.l,W/2-15,y);
    ctx.fillStyle=it.c; ctx.font='bold 15px monospace'; ctx.textAlign='left'; ctx.fillText(''+it.v,W/2+15,y);
    y+=25;
  }
  
  y+=10; ctx.fillStyle='#fff'; ctx.font='bold 13px Orbitron'; ctx.textAlign='center'; ctx.fillText('ÖDÜLLER',W/2|0,y);
  y+=20; ctx.fillStyle=C.accent; ctx.font='bold 15px monospace';
  ctx.fillText('+'+level*10+' XP  +'+(score*0.05|0)+' Coin',W/2|0,y|0);
  
  y=H-80;
  ctx.fillStyle=C.accent; ctx.font='bold 16px Rajdhani'; ctx.textAlign='center';
  ctx.fillText('▶ TEKRAR OYNA (ENTER)',W/2|0,y|0);
  ctx.fillStyle='#666677'; ctx.fillText('◀ ANA MENÜ (ESC)',W/2|0,y+25|0);
}

// =====================================================
// BAŞLAT
// =====================================================
requestAnimationFrame(loop);
</script>
