<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Rajdhani',sans-serif; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// =====================================================
// SNAKE EVOLUTION — Tek Dosya Oyun
// =====================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Boyut
const W = 800, H = 600, GS = 20;
const COLS = W/GS, ROWS = H/GS;

function resize() {
  const s = Math.min(innerWidth/W, innerHeight/H);
  canvas.width = W*s; canvas.height = H*s;
  canvas.style.width = W*s+'px'; canvas.style.height = H*s+'px';
  ctx.setTransform(s,0,0,s,0,0);
}
resize(); addEventListener('resize', resize);

// =====================================================
// OYUN DURUMU
// =====================================================
let state = 'menu'; // menu, play, dead, levelup
let score = 0, level = 1, xp = 0, xpNext = 30;
let combo = 0, comboTimer = 0, comboMult = 1;
let shakeX = 0, shakeY = 0, shakeTimer = 0;
let flashColor = null, flashTimer = 0;
let gameTime = 0;
let particles = [];
let notifications = [];
let upgrades = [];
let hp = 4, maxHp = 4;
let invTimer = 0;
let bossActive = null;
let bossHp = 0, bossMaxHp = 0;
let bossAttackTimer = 0;
let enemies = [];
let enemySpawnTimer = 0;
let selectedBtn = 0;
let selectedUpgrade = 0;
let upgradeChoices = [];
let menuAnim = 0;
let deadTimer = 0;

// Yılan
let snake = [];
let dir = {x:0,y:-1};
let nextDir = {x:0,y:-1};
let moveTimer = 0;
let speed = 6;

// Yemler
let foods = [];
let foodTimer = 0;

// Tile harita
let tiles = [];

// =====================================================
// RENKLER
// =====================================================
const C = {
  bg: '#06060f', grid: '#0c0c1e', gridA: '#121230',
  wall: '#14142e', wallG: '#1e1e48',
  accent: '#00ffd5', accent2: '#ff2d95', accent3: '#ffe14d',
  lava: '#ff3d00', ice: '#00d4ff', bush: '#003828',
  electric: '#ffe14d', portal: '#b44dff'
};

// =====================================================
// YARDIMCI
// =====================================================
function rnd(a,b) { return a+Math.random()*(b-a); }
function rndInt(a,b) { return Math.floor(rnd(a,b+1)); }
function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1,y2-y1); }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function hexToRgb(h) { return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }
function rgbStr(r,g,b,a) { return a!==undefined?`rgba(${r|0},${g|0},${b|0},${a})`:`rgb(${r|0},${g|0},${b|0})`; }
function lighten(hex,n) { const c=hexToRgb(hex); return rgbStr(c.r+n,c.g+n,c.b+n); }
function darken(hex,n) { const c=hexToRgb(hex); return rgbStr(Math.max(0,c.r-n),Math.max(0,c.g-n),Math.max(0,c.b-n)); }
function colorAlpha(hex,a) { const c=hexToRgb(hex); return rgbStr(c.r,c.g,c.b,a); }

// =====================================================
// PARÇACIK SİSTEMİ
// =====================================================
function emit(x,y,vx,vy,life,size,color,shape) {
  particles.push({x,y,vx,vy,life,maxLife:life,size,color:color||C.accent,shape:shape||'dot',rot:rnd(0,6.28)});
}
function burst(x,y,color,count) {
  for(let i=0;i<(count||10);i++){
    const a=rnd(0,6.28), s=rnd(40,120);
    emit(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.3,0.6),rnd(2,4),color);
  }
}
function ring(x,y,color,r) {
  for(let i=0;i<20;i++){
    const a=6.28*i/20;
    emit(x,y,Math.cos(a)*r,Math.sin(a)*r,0.4,2,color,'ring');
  }
}
function floatText(x,y,text,color) {
  particles.push({x,y,vx:0,vy:-60,life:0.8,maxLife:0.8,size:16,color,shape:'text',text});
}

function updateParticles(dt) {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.97; p.vy*=0.97;
    p.vy+=50*dt;
  }
}

function drawParticles() {
  for(const p of particles){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    if(p.shape==='dot'){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*a,0,6.28);
      ctx.fill();
    } else if(p.shape==='text'){
      ctx.font=`bold ${p.size}px Orbitron`;
      ctx.textAlign='center';
      ctx.fillText(p.text,p.x,p.y);
    } else if(p.shape==='ring'){
      ctx.strokeStyle=p.color;
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*(1-a)*3,0,6.28);
      ctx.stroke();
    } else if(p.shape==='star'){
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      for(let j=0;j<5;j++){
        const aa=6.28*j/5-Math.PI/2;
        const r=p.size*a;
        if(j===0)ctx.moveTo(Math.cos(aa)*r,Math.sin(aa)*r);
        else ctx.lineTo(Math.cos(aa)*r,Math.sin(aa)*r);
        const innerA=aa+6.28/10;
        ctx.lineTo(Math.cos(innerA)*r*0.4,Math.sin(innerA)*r*0.4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha=1;
}

// =====================================================
// BİLDİRİMLER
// =====================================================
function notify(text,color) {
  notifications.push({text,color:color||'#fff',timer:2.5});
}
function updateNotifications(dt) {
  for(let i=notifications.length-1;i>=0;i--){
    notifications[i].timer-=dt;
    if(notifications[i].timer<=0)notifications.splice(i,1);
  }
}
function drawNotifications() {
  let y=100;
  for(const n of notifications){
    ctx.globalAlpha=Math.min(1,n.timer);
    ctx.fillStyle=n.color;
    ctx.font="bold 16px Rajdhani";
    ctx.textAlign='center';
    ctx.fillText(n.text,W/2,y);
    y+=24;
  }
  ctx.globalAlpha=1;
}

// =====================================================
// HARİTA
// =====================================================
function genMap() {
  tiles=[];
  for(let y=0;y<ROWS;y++){
    tiles[y]=[];
    for(let x=0;x<COLS;x++){
      if(x===0||x===COLS-1||y===0||y===ROWS-1) tiles[y][x]=1; // duvar
      else tiles[y][x]=0;
    }
  }
  // Rastgele engeller
  for(let i=0;i<8;i++){
    const x=rndInt(3,COLS-4), y=rndInt(3,ROWS-4);
    tiles[y][x]=rndInt(2,4); // kaya/lava/buz
  }
  // Spawn bölgesini temizle
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
    const nx=cx+dx, ny=cy+dy;
    if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1) tiles[ny][nx]=0;
  }
}

function drawMap() {
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const t=tiles[y][x];
    if(t===0) continue;
    const px=x*GS, py=y*GS;
    if(t===1){ // duvar
      const g=ctx.createLinearGradient(px,py,px+GS,py+GS);
      g.addColorStop(0,C.wall); g.addColorStop(1,C.wallG);
      ctx.fillStyle=g;
      ctx.fillRect(px,py,GS,GS);
      ctx.strokeStyle=C.wallG+'88';
      ctx.lineWidth=0.5;
      ctx.strokeRect(px+0.5,py+0.5,GS-1,GS-1);
    } else if(t===2){ // kaya
      ctx.fillStyle='#3a3a4a';
      ctx.fillRect(px+2,py+2,GS-4,GS-4);
      ctx.fillStyle='#4a4a5a';
      ctx.fillRect(px+3,py+3,GS-6,GS-6);
    } else if(t===3){ // lava
      const tt=Date.now()/500;
      const g=ctx.createRadialGradient(px+GS/2+Math.sin(tt)*3,py+GS/2+Math.cos(tt)*3,0,px+GS/2,py+GS/2,GS/2);
      g.addColorStop(0,'#ffaa00'); g.addColorStop(0.5,C.lava); g.addColorStop(1,'#881100');
      ctx.fillStyle=g;
      ctx.fillRect(px,py,GS,GS);
    } else if(t===4){ // buz
      ctx.fillStyle=C.ice+'33';
      ctx.fillRect(px,py,GS,GS);
      ctx.strokeStyle=C.ice+'66';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(px+GS/2,py+2); ctx.lineTo(px+GS-2,py+GS/2);
      ctx.lineTo(px+GS/2,py+GS-2); ctx.lineTo(px+2,py+GS/2);
      ctx.closePath(); ctx.stroke();
    }
  }
}

// =====================================================
// YEM SİSTEMİ
// =====================================================
const FOOD_TYPES = [
  {type:'normal',color:'#ff2244',weight:50,score:1,len:1,xp:0,hp:0},
  {type:'golden',color:'#ffaa00',weight:12,score:5,len:2,xp:0,hp:0},
  {type:'crystal',color:'#aa44ff',weight:10,score:0,len:0,xp:25,hp:0},
  {type:'heart',color:'#ff44aa',weight:8,score:0,len:0,xp:0,hp:1},
  {type:'clock',color:'#4488ff',weight:5,score:0,len:0,xp:0,hp:0,effect:'slow'},
  {type:'magnet',color:'#00ffcc',weight:4,score:0,len:0,xp:0,hp:0,effect:'magnet'},
  {type:'star',color:'#ffffff',weight:3,score:0,len:0,xp:0,hp:0,effect:'invincible'},
  {type:'coin',color:'#ffcc00',weight:5,score:0,len:0,xp:0,hp:0,effect:'coin'}
];

function pickFood() {
  const total=FOOD_TYPES.reduce((s,f)=>s+f.weight,0);
  let r=Math.random()*total;
  for(const f of FOOD_TYPES){r-=f.weight;if(r<=0)return f.type;}
  return 'normal';
}

function spawnFood() {
  if(foods.length>=8) return;
  const type=pickFood();
  const def=FOOD_TYPES.find(f=>f.type===type);
  let x,y,tries=0;
  do { x=rndInt(2,COLS-3); y=rndInt(2,ROWS-3); tries++; }
  while(tiles[y][x]!==0 && tries<50);
  if(tries>=50) return;
  foods.push({x,y,type,...def,anim:rnd(0,6.28),alive:true});
}

function drawFood() {
  const now=Date.now();
  for(const f of foods){
    if(!f.alive) continue;
    const cx=f.x*GS+GS/2, cy=f.y*GS+GS/2;
    const pulse=Math.sin(now/300+f.anim)*0.15+1;
    const sz=(GS/2-2)*pulse;
    
    ctx.save();
    ctx.shadowColor=f.color;
    ctx.shadowBlur=10+Math.sin(now/400+f.anim)*5;
    
    // Gradient
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,lighten(f.color,60));
    g.addColorStop(0.7,f.color);
    g.addColorStop(1,darken(f.color,40));
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(cx,cy,sz,0,6.28);
    ctx.fill();
    
    // Highlight
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx-3,cy-3,sz*0.3,0,6.28);
    ctx.fill();
    
    // Tip ikonu
    ctx.fillStyle='#fff';
    ctx.font=`bold ${sz*0.8|0}px Arial`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const icons={normal:'🍎',golden:'⭐',crystal:'💎',heart:'❤️',clock:'⏱️',magnet:'🧲',star:'✨',coin:'🪙'};
    ctx.fillText(icons[f.type]||'●',cx,cy);
    
    ctx.restore();
  }
}

// =====================================================
// YILAN
// =====================================================
function initSnake() {
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx,y:cy+1},{x:cx,y:cy+2}];
  dir={x:0,y:-1}; nextDir={x:0,y:-1};
  moveTimer=0; speed=6; hp=4; maxHp=4;
  invTimer=1.5;
}

function updateSnake(dt) {
  moveTimer+=dt;
  const interval=1/speed;
  while(moveTimer>=interval){
    moveTimer-=interval;
    // Yönü uygula
    if(dir.x!==-nextDir.x || dir.y!==-nextDir.y) dir={...nextDir};
    
    const head=snake[0];
    let nx=head.x+dir.x, ny=head.y+dir.y;
    
    // Duvar kontrolü
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS||tiles[ny][nx]===1){
      if(invTimer<=0){ die('wall'); return; }
      continue;
    }
    
    // Kuyruk kontrolü
    if(invTimer<=0){
      for(let i=1;i<snake.length;i++){
        if(snake[i].x===nx&&snake[i].y===ny){ die('self'); return; }
      }
    }
    
    // Düşman kontrolü
    if(invTimer<=0){
      for(const e of enemies){
        if(e.alive&&e.x===nx&&e.y===ny){ die('enemy'); return; }
      }
    }
    
    // Boss kontrolü
    if(bossActive && invTimer<=0){
      if(dist(nx,ny,bossActive.x,bossActive.y)<2){ die('boss'); return; }
    }
    
    // Hareket
    snake.unshift({x:nx,y:ny});
    while(snake.length>3+level) snake.pop();
    
    // Yem kontrolü
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];
      if(f.alive&&f.x===nx&&f.y===ny){
        collectFood(f);
        foods.splice(i,1);
      }
    }
  }
  
  // Invincibility
  if(invTimer>0) invTimer-=dt;
  
  // Combo timer
  if(comboTimer>0){
    comboTimer-=dt;
    if(comboTimer<=0){combo=0;comboMult=1;}
  }
}

function drawSnake() {
  const now=Date.now();
  const skinHead=C.accent, skinBody='#00aa88', skinGlow=C.accent;
  
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i];
    const px=s.x*GS+GS/2, py=s.y*GS+GS/2;
    const segT=i/Math.max(1,snake.length-1);
    const scale=1-segT*0.3;
    const sz=(GS/2-1)*scale;
    
    ctx.save();
    
    // Invincible yanıp sönme
    if(invTimer>0 && Math.floor(now/100)%2===0) ctx.globalAlpha=0.4;
    
    if(i===0){
      // KAFA
      ctx.shadowColor=skinGlow;
      ctx.shadowBlur=15;
      
      const g=ctx.createRadialGradient(px-3,py-3,1,px,py,sz+2);
      g.addColorStop(0,lighten(skinHead,60));
      g.addColorStop(0.7,skinHead);
      g.addColorStop(1,darken(skinHead,40));
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(px,py,sz+2,0,6.28);
      ctx.fill();
      
      // Highlight
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(px-4,py-4,sz*0.35,0,6.28);
      ctx.fill();
      
      // Gözler
      const eyeOff=sz*0.35, eyeSz=sz*0.22;
      const lx=px+dir.x*3-dir.y*eyeOff, ly=py+dir.y*3+dir.x*eyeOff;
      const rx=px+dir.x*3+dir.y*eyeOff, ry=py+dir.y*3-dir.x*eyeOff;
      
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(lx,ly,eyeSz+2,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(rx,ry,eyeSz+2,0,6.28); ctx.fill();
      
      ctx.fillStyle=skinGlow;
      ctx.beginPath(); ctx.arc(lx+dir.x*1.5,ly+dir.y*1.5,eyeSz*0.7,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(rx+dir.x*1.5,ry+dir.y*1.5,eyeSz*0.7,0,6.28); ctx.fill();
      
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(lx+dir.x*2.5,ly+dir.y*2.5,eyeSz*0.4,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(rx+dir.x*2.5,ry+dir.y*2.5,eyeSz*0.4,0,6.28); ctx.fill();
      
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(lx-1,ly-1,eyeSz*0.2,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(rx-1,ry-1,eyeSz*0.2,0,6.28); ctx.fill();
      
    } else {
      // GÖVDE
      ctx.shadowColor=skinGlow;
      ctx.shadowBlur=6;
      
      const g=ctx.createRadialGradient(px-2,py-2,0,px,py,sz);
      g.addColorStop(0,lighten(skinBody,30));
      g.addColorStop(1,skinBody);
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(px,py,sz,0,6.28);
      ctx.fill();
      
      // Segment deseni
      ctx.shadowBlur=0;
      if(i%2===0){
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(px-1,py-1,sz*0.4,0,6.28);
        ctx.fill();
      }
    }
    
    ctx.restore();
  }
}

// =====================================================
// DÜŞMANLAR
// =====================================================
function spawnEnemy() {
  const types=['bug','chaser','ghost'];
  const type=types[rndInt(0,types.length-1)];
  let x,y,tries=0;
  do { x=rndInt(3,COLS-4); y=rndInt(3,ROWS-4); tries++; }
  while((tiles[y][x]!==0||dist(x,y,snake[0].x,snake[0].y)<8)&&tries<50);
  if(tries>=50) return;
  const defs={bug:{speed:2,hp:1,color:'#ff2244'},chaser:{speed:3,hp:1,color:'#ff4444'},ghost:{speed:1.5,hp:999,color:'#aaaaff'}};
  const d=defs[type];
  enemies.push({x,y,type,...d,alive:true,moveTimer:0,anim:0,dir:{x:0,y:-1}});
}

function updateEnemies(dt) {
  enemySpawnTimer+=dt;
  if(enemySpawnTimer>=8 && enemies.length<5){
    enemySpawnTimer=0;
    spawnEnemy();
  }
  
  for(const e of enemies){
    if(!e.alive) continue;
    e.anim+=dt;
    e.moveTimer+=dt;
    const interval=1/e.speed;
    if(e.moveTimer>=interval){
      e.moveTimer=0;
      const head=snake[0];
      if(e.type==='chaser'){
        // Oyuncuya doğru
        const dx=head.x-e.x, dy=head.y-e.y;
        if(Math.abs(dx)>Math.abs(dy)) e.dir={x:dx>0?1:-1,y:0};
        else e.dir={x:0,y:dy>0?1:-1};
      } else if(e.type==='bug'){
        // Rastgele
        if(Math.random()<0.3) e.dir=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}][rndInt(0,3)];
      }
      // Hayalet duvarlardan geçer
      let nx=e.x+e.dir.x, ny=e.y+e.dir.y;
      if(e.type==='ghost'){
        nx=((nx%COLS)+COLS)%COLS;
        ny=((ny%ROWS)+ROWS)%ROWS;
      } else {
        if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1||tiles[ny][nx]===1) continue;
      }
      e.x=nx; e.y=ny;
    }
  }
}

function drawEnemies() {
  const now=Date.now();
  for(const e of enemies){
    if(!e.alive) continue;
    const cx=e.x*GS+GS/2, cy=e.y*GS+GS/2;
    const sz=GS/2-2;
    
    ctx.save();
    ctx.globalAlpha=e.type==='ghost'?(0.4+Math.sin(e.anim*3)*0.2):1;
    
    // Glow
    ctx.shadowColor=e.color;
    ctx.shadowBlur=8;
    
    // Gövde
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,lighten(e.color,40));
    g.addColorStop(1,darken(e.color,40));
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(cx,cy,sz*0.8,0,6.28);
    ctx.fill();
    
    // Gözler
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff0000';
    ctx.beginPath(); ctx.arc(cx-3,cy-3,2,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+3,cy-3,2,0,6.28); ctx.fill();
    
    ctx.restore();
  }
}

// =====================================================
// BOSS
// =====================================================
function spawnBoss() {
  bossActive={x:Math.floor(COLS/2),y:5,hp:15+level*2,maxHp:15+level*2,color:C.accent2,name:'BOSS',anim:0};
  bossHp=bossActive.hp; bossMaxHp=bossActive.maxHp;
  bossAttackTimer=0;
  notify('⚠️ BOSS GELİYOR!','#ff0044');
}

function updateBoss(dt) {
  if(!bossActive) return;
  bossActive.anim+=dt;
  
  // Hareket (yavaşça aşağı)
  bossActive.y+=dt*0.5;
  if(bossActive.y>ROWS-5) bossActive.y=5;
  
  // Çarpışma
  if(invTimer<=0 && dist(snake[0].x,snake[0].y,bossActive.x,bossActive.y)<2){
    die('boss');
  }
}

function hitBoss(dmg) {
  if(!bossActive) return;
  bossActive.hp-=dmg;
  burst(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,bossActive.color,8);
  
  if(bossActive.hp<=0){
    burst(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,'#ffaa00',30);
    ring(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,'#ffffff',80);
    notify('🏆 BOSS YENİLDİ!','#ffaa00');
    bossActive=null;
    score+=50;
  }
}

function drawBoss() {
  if(!bossActive) return;
  const cx=bossActive.x*GS+GS/2, cy=bossActive.y*GS+GS/2;
  const sz=GS*1.5;
  
  ctx.save();
  ctx.shadowColor=bossActive.color;
  ctx.shadowBlur=20;
  
  // Gövde
  const g=ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,sz);
  g.addColorStop(0,lighten(bossActive.color,60));
  g.addColorStop(0.5,bossActive.color);
  g.addColorStop(1,darken(bossActive.color,60));
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(cx,cy,sz,0,6.28);
  ctx.fill();
  
  // Desen
  ctx.strokeStyle=bossActive.color+'44';
  ctx.lineWidth=2;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc(cx,cy,sz*(0.3+i*0.2),bossActive.anim+i*2,bossActive.anim+i*2+4);
    ctx.stroke();
  }
  
  // Gözler
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-sz*0.3,cy-sz*0.2,7,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+sz*0.3,cy-sz*0.2,7,0,6.28); ctx.fill();
  ctx.fillStyle=bossActive.color;
  ctx.beginPath(); ctx.arc(cx-sz*0.3,cy-sz*0.2,4,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+sz*0.3,cy-sz*0.2,4,0,6.28); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(cx-sz*0.3,cy-sz*0.2,2,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+sz*0.3,cy-sz*0.2,2,0,6.28); ctx.fill();
  
  // HP bar
  const barW=GS*6, barH=10, barX=cx-barW/2, barY=cy-sz-20;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(barX-2,barY-2,barW+4,barH+4);
  const hpPct=bossActive.hp/bossActive.maxHp;
  const hpG=ctx.createLinearGradient(barX,barY,barX+barW*hpPct,barY);
  hpG.addColorStop(0,'#ff0044'); hpG.addColorStop(1,'#ff4488');
  ctx.fillStyle=hpG;
  ctx.fillRect(barX,barY,barW*hpPct,barH);
  
  // İsim
  ctx.fillStyle='#fff';
  ctx.font="bold 14px Orbitron";
  ctx.textAlign='center';
  ctx.fillText(bossActive.name,cx,barY-6);
  
  ctx.restore();
}

// YEM TOPLAMA
// =====================================================
function collectFood(f) {
  combo++; comboTimer=2;
  if(combo>=3)comboMult=2;
  if(combo>=5)comboMult=3;
  if(combo>=8)comboMult=5;
  if(combo>=12)comboMult=10;
  
  score+=(f.score||0)*comboMult;
  xp+=(f.xp||0);
  if(f.len>0) snake.push({...snake[snake.length-1]});
  if(f.hp>0) hp=Math.min(hp+f.hp,maxHp);
  
  // Boss hasar
  if(bossActive) hitBoss(1);
  
  // Efektler
  const cx=f.x*GS+GS/2, cy=f.y*GS+GS/2;
  burst(cx,cy,f.color,8);
  if(f.score>0) floatText(cx,cy-10,`+${f.score*f.mult||f.score}`,f.color);
  
  // Level up
  if(xp>=xpNext){
    xp-=xpNext;
    level++;
    xpNext=Math.floor(xpNext*1.2);
    speed=Math.min(15,6+level*0.2);
    showUpgradeScreen();
  }
  
  // Combo
  if(combo>=3){
    shake(3,0.15);
    if(combo>=5) ring(cx,cy,'#ffaa00',40);
  }
  
  // Boss spawn
  if(level%5===0 && !bossActive && level>1) spawnBoss();
  
  // Ses efekti (basit bip)
  playSound(440+combo*20,0.08);
}

function die(reason) {
  state='dead';
  deadTimer=0;
  shake(10,0.5);
  flash('#ff0044',0.3);
  
  // Parçalanma
  for(const s of snake){
    burst(s.x*GS+GS/2,s.y*GS+GS/2,C.accent,6);
  }
  
  playSound(200,0.3);
}

const UPGRADES = [
  {id:'speed',name:'Hız Artışı',desc:'+%15 hız',icon:'🏃',color:'#00ffcc'},
  {id:'hp',name:'Extra Can',desc:'+1 max can',icon:'❤️',color:'#ff44aa'},
  {id:'magnet',name:'Mıknatıs',desc:'Yemleri çeker',icon:'🧲',color:'#00ffcc'},
  {id:'score2x',name:'2x Puan',desc:'Çift puan',icon:'💯',color:'#ffaa00'},
  {id:'xp2x',name:'2x XP',desc:'Çift XP',icon:'📈',color:'#aa44ff'},
  {id:'shield',name:'Kalkan',desc:'1 çarpışma affet',icon:'🛡️',color:'#4488ff'},
  {id:'long',name:'Uzun Kuyruk',desc:'+3 uzunluk',icon:'📏',color:'#00ffcc'},
  {id:'fire',name:'Ateş Kuyruk',desc:'Düşman hasar',icon:'🔥',color:'#ff4400'}
];

function showUpgradeScreen() {
  state='levelup';
  selectedUpgrade=0;
  upgradeChoices=[];
  const used=new Set();
  for(let i=0;i<3;i++){
    let idx;
    do{idx=rndInt(0,UPGRADES.length-1);}while(used.has(idx));
    used.add(idx);
    upgradeChoices.push(UPGRADES[idx]);
  }
  shake(5,0.3);
  flash('#ffaa00',0.2);
  playSound(523,0.15);
}

function applyUpgrade(u) {
  upgrades.push(u.id);
  switch(u.id){
    case 'speed': speed*=1.15; break;
    case 'hp': maxHp++; hp++; break;
    case 'score2x': /* handled in collectFood */ break;
    case 'xp2x': /* handled in collectFood */ break;
    case 'shield': invTimer=5; break;
    case 'long': for(let i=0;i<3;i++) snake.push({...snake[snake.length-1]}); break;
    case 'fire': /* visual effect */ break;
    case 'magnet': /* handled in drawFood */ break;
  }
  notify(`⬆️ ${u.name}!`,u.color);
  playSound(660,0.12);
}

// =====================================================
// SES
// =====================================================
let audioCtx;
function initAudio() {
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
function playSound(freq,dur) {
  if(!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// =====================================================
// EFEKTLER
// =====================================================
function shake(intensity,dur) { shakeX=intensity; shakeY=intensity; shakeTimer=dur; }
function flash(color,dur) { flashColor=color; flashTimer=dur; }

function updateEffects(dt) {
  if(shakeTimer>0){
    shakeTimer-=dt;
    const t=shakeTimer;
    shakeX=(Math.random()-0.5)*shakeX*2*t;
    shakeY=(Math.random()-0.5)*shakeY*2*t;
  } else { shakeX=0; shakeY=0; }
  if(flashTimer>0) flashTimer-=dt;
}

function applyEffects() {
  ctx.save();
  ctx.translate(shakeX,shakeY);
}

function restoreEffects() {
  ctx.restore();
  if(flashTimer>0 && flashColor){
    ctx.globalAlpha=flashTimer;
    ctx.fillStyle=flashColor;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
}

let keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='ArrowUp'||e.code==='KeyW') e.preventDefault();
  if(e.code==='ArrowDown'||e.code==='KeyS') e.preventDefault();
  if(e.code==='ArrowLeft'||e.code==='KeyA') e.preventDefault();
  if(e.code==='ArrowRight'||e.code==='KeyD') e.preventDefault();
  
  if(state==='menu'){
    if(e.code==='ArrowUp') selectedBtn=(selectedBtn-1+3)%3;
    if(e.code==='ArrowDown') selectedBtn=(selectedBtn+1)%3;
    if(e.code==='Enter'||e.code==='Space'){initAudio();startGame();}
  } else if(state==='play'){
    if(e.code==='ArrowUp'||e.code==='KeyW') nextDir={x:0,y:-1};
    if(e.code==='ArrowDown'||e.code==='KeyS') nextDir={x:0,y:1};
    if(e.code==='ArrowLeft'||e.code==='KeyA') nextDir={x:-1,y:0};
    if(e.code==='ArrowRight'||e.code==='KeyD') nextDir={x:1,y:0};
  } else if(state==='dead'){
    if(e.code==='Enter'||e.code==='Space') startGame();
    if(e.code==='Escape') state='menu';
  } else if(state==='levelup'){
    if(e.code==='ArrowLeft') selectedUpgrade=(selectedUpgrade-1+3)%3;
    if(e.code==='ArrowRight') selectedUpgrade=(selectedUpgrade+1)%3;
    if(e.code==='Digit1') {applyUpgrade(upgradeChoices[0]);state='play';}
    if(e.code==='Digit2') {applyUpgrade(upgradeChoices[1]);state='play';}
    if(e.code==='Digit3') {applyUpgrade(upgradeChoices[2]);state='play';}
    if(e.code==='Enter'||e.code==='Space'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
  }
});
addEventListener('keyup',e=>keys[e.code]=false);

// Dokunmatik
let touchStart=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  initAudio();
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,time:Date.now()};
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!touchStart) return;
  const dx=e.changedTouches[0].clientX-touchStart.x;
  const dy=e.changedTouches[0].clientY-touchStart.y;
  const d=Math.hypot(dx,dy);
  if(d<15){
    // Tap
    if(state==='menu') startGame();
    else if(state==='dead') startGame();
    else if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
  } else if(d>30){
    if(Math.abs(dx)>Math.abs(dy)) nextDir={x:dx>0?1:-1,y:0};
    else nextDir={x:0,y:dy>0?1:-1};
  }
  touchStart=null;
},{passive:false});

// =====================================================
// ANA DÖNGÜ
// =====================================================
function startGame() {
  state='play';
  score=0; level=1; xp=0; xpNext=30;
  combo=0; comboTimer=0; comboMult=1;
  gameTime=0; upgrades=[];
  enemies=[]; enemySpawnTimer=0;
  bossActive=null; foods=[];
  particles=[]; notifications=[];
  genMap();
  initSnake();
  for(let i=0;i<5;i++) spawnFood();
  notify('🎮 Başla!','#00ffcc');
}

let lastTime=0;
function gameLoop(now) {
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  
  // GÜNCELLE
  if(state==='play'){
    gameTime+=dt;
    updateSnake(dt);
    updateEnemies(dt);
    updateBoss(dt);
    
    // Yem spawn
    foodTimer+=dt;
    if(foodTimer>=1.5){foodTimer=0;spawnFood();}
    
    // Mıknatıs
    if(upgrades.includes('magnet')){
      for(const f of foods){
        if(!f.alive) continue;
        const d=dist(snake[0].x,snake[0].y,f.x,f.y);
        if(d<5 && d>0.5){
          const angle=Math.atan2(snake[0].y-f.y,snake[0].x-f.x);
          f.x+=Math.cos(angle)*0.1;
          f.y+=Math.sin(angle)*0.1;
        }
      }
    }
  }
  
  updateParticles(dt);
  updateEffects(dt);
  updateNotifications(dt);
  
  // ÇİZ
  ctx.save();
  const s=Math.min(innerWidth/W,innerHeight/H);
  ctx.setTransform(s,0,0,s,0,0);
  
  // Arka plan
  const bgG=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  bgG.addColorStop(0,C.bg); bgG.addColorStop(1,'#000');
  ctx.fillStyle=bgG;
  ctx.fillRect(0,0,W,H);
  
  // Grid
  ctx.strokeStyle=C.grid;
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  
  applyEffects();
  
  if(state==='menu'){
    menuAnim+=dt;
    drawMenu();
  } else if(state==='play'){
    drawMap();
    drawFood();
    drawEnemies();
    drawBoss();
    drawSnake();
    drawParticles();
    drawHUD();
  } else if(state==='dead'){
    drawMap();
    drawParticles();
    drawDead();
  } else if(state==='levelup'){
    drawMap();
    drawFood();
    drawSnake();
    drawParticles();
    drawLevelUp();
  }
  
  drawNotifications();
  restoreEffects();
  
  ctx.restore();
  
  requestAnimationFrame(gameLoop);
}

function drawLevelUp() {

  ctx.save();
  ctx.shadowColor='#ffaa00';
  ctx.shadowBlur=20;

      ctx.shadowBlur=15;
      ctx.strokeStyle=u.color+'44';
      roundRect(ctx,x,y,cardW,cardH,10);
      ctx.stroke();
    }

    ctx.shadowBlur=0;
    ctx.fillStyle=u.color+'22';
    roundRect(ctx,x,y,cardW,30,10);
    ctx.fill();

    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(u.icon,x+cardW/2,y+65);
    
    // İsim
    ctx.fillStyle='#fff';
    ctx.font="bold 15px Orbitron";

    ctx.fillStyle='#b0b0cc';

}

// =====================================================
// GAME OVER EKRANI
// =====================================================
function drawDead() {
  deadTimer+=0.016;
  
  const og=ctx.createRadialGradient(W/2,H/3,0,W/2,H/2,H);
  og.addColorStop(0,'rgba(20,0,0,0.85)');
  og.addColorStop(1,'rgba(0,0,0,0.95)');
  ctx.fillStyle=og;
  ctx.fillRect(0,0,W,H);
  
  ctx.save();
  ctx.shadowColor='#ff0044';
  ctx.shadowBlur=15+Math.sin(Date.now()/600)*8;
  ctx.fillStyle='#ff0044';
  ctx.font="900 44px Orbitron";
  ctx.textAlign='center';
  ctx.fillText('GAME',W/2,90);
  ctx.fillStyle='#ff2d66';
  ctx.fillText('OVER',W/2,135);
  ctx.restore();
  
  // Neon çizgi
  const lg=ctx.createLinearGradient(W/2-150,0,W/2+150,0);
  lg.addColorStop(0,'#ff004400'); lg.addColorStop(0.5,'#ff0044'); lg.addColorStop(1,'#ff004400');
  ctx.strokeStyle=lg;
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(W/2-150,155); ctx.lineTo(W/2+150,155); ctx.stroke();
  
  // İstatistikler
  const items=[
    {label:'SCORE',value:score,color:C.accent},
    {label:'TIME',value:Math.floor(gameTime)+'s',color:'#888899'},
    {label:'LEVEL',value:level,color:'#ffaa00'},
    {label:'COMBO',value:`x${combo}`,color:'#ffaa00'}
  ];
  
  let y=185;
  for(const item of items){
    ctx.fillStyle='#556677';
    ctx.font="11px Orbitron";
    ctx.textAlign='right';
    ctx.fillText(item.label,W/2-15,y);
    ctx.fillStyle=item.color;
    ctx.font="bold 16px monospace";
    ctx.textAlign='left';
    ctx.fillText(String(item.value),W/2+15,y);
    y+=28;
  }
  
  // Ödüller
  y+=15;
  ctx.strokeStyle='#ffffff11';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-120,y); ctx.lineTo(W/2+120,y); ctx.stroke();
  y+=20;
  ctx.fillStyle='#fff';
  ctx.font="bold 14px Orbitron";
  ctx.textAlign='center';
  ctx.fillText('REWARDS',W/2,y);
  y+=25;
  ctx.fillStyle=C.accent;
  ctx.font="bold 18px monospace";
  ctx.fillText(`+${level*15} XP`,W/2-60,y);
  ctx.fillStyle='#ffcc00';
  ctx.fillText(`+${Math.floor(score*0.05)} COIN`,W/2+60,y);
  
  // Butonlar
  y=H-100;
  const btns=['▶ PLAY AGAIN','◀ MAIN MENU'];
  for(let i=0;i<btns.length;i++){
    ctx.fillStyle=i===0?C.accent:'#666677';
    ctx.font=`${i===0?'bold ':''}18px Rajdhani`;
    ctx.textAlign='center';
    ctx.fillText(btns[i],W/2-100+i*200,y);
  }
  
  ctx.fillStyle='#55667788';
  ctx.font="12px Rajdhani";
  ctx.fillText('ENTER: Tekrar  •  ESC: Menü',W/2,H-20);
}

// =====================================================
// YUVARLAK KÖŞE
// =====================================================
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// =====================================================
// BAŞLAT
// =====================================================
requestAnimationFrame(gameLoop);
