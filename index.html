// Rarity ağırlıkları
const RARITY_W={common:50,uncommon:30,rare:15,epic:4,legendary:1};

function pickUpgrades(count){
  const result=[];
  const used=new Set();
  for(let i=0;i<count;i++){
    let best=null,bestW=0;
    for(const u of ALL_UPGRADES){
      if(used.has(u.id))continue;
      const w=RARITY_W[u.rarity]||10;
      if(Math.random()*w>bestW){best=u;bestW=w;}
    }
    if(best){result.push(best);used.add(best.id);}
  }
  return result;
}

// YARDIMCI
// =====================================================
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return rnd(a,b+1)|0}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return v<a?a:v>b?b:v}

function emit(x,y,vx,vy,life,sz,col){
  if(particles.length>150)return;
  particles.push({x,y,vx,vy,life,ml:life,sz,col:col||'#fff'});
}
function burst(x,y,col,n){
  for(let i=0;i<(n||6);i++){
    const a=rnd(0,PI2),s=rnd(30,80);
    emit(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.2,0.4),rnd(2,3),col);
  }
}
function floatText(x,y,txt,col){particles.push({x,y,vx:0,vy:-40,life:0.6,ml:0.6,sz:14,col,txt,shape:'text'});}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.95;p.vy*=0.95;p.vy+=30*dt;
  }
}
function drawParticles(){
  for(const p of particles){
    const a=p.life/p.ml;ctx.globalAlpha=a;ctx.fillStyle=p.col;
    if(p.shape==='text'){ctx.font='bold '+p.sz+'px Orbitron';ctx.textAlign='center';ctx.fillText(p.txt,p.x|0,p.y|0);}
    else{const s=p.sz*a;ctx.fillRect((p.x-s/2)|0,(p.y-s/2)|0,s|0,s|0);}
  }
  ctx.globalAlpha=1;
}

function notify(t,c){if(notifications.length<4)notifications.push({t,c:c||'#fff',tm:2.5})}
function updateNotifications(dt){for(let i=notifications.length-1;i>=0;i--){notifications[i].tm-=dt;if(notifications[i].tm<=0)notifications.splice(i,1)}}
function drawNotifications(){
  let y=95;
  for(const n of notifications){ctx.globalAlpha=Math.min(1,n.tm);ctx.fillStyle=n.c;ctx.font='bold 15px Rajdhani';ctx.textAlign='center';ctx.fillText(n.t,W/2|0,y);y+=22;}
  ctx.globalAlpha=1;
}

function genMap(){
  tiles=[];
  for(let y=0;y<ROWS;y++){tiles[y]=new Uint8Array(COLS);for(let x=0;x<COLS;x++){if(x===0||x===COLS-1||y===0||y===ROWS-1)tiles[y][x]=1;}}
  for(let i=0;i<5;i++){const x=rndInt(4,COLS-5),y=rndInt(4,ROWS-5);tiles[y][x]=rndInt(2,4);}
  const cx=COLS/2|0,cy=ROWS/2|0;
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){const nx=cx+dx,ny=cy+dy;if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1)tiles[ny][nx]=0;}
}

function checkTileEffects(dt){
  if(snake.length===0)return;
  const head=snake[0],tile=tiles[head.y]?tiles[head.y][head.x]:0;
  tileEffectTimer+=dt;
  if(tile===3&&tileEffectTimer>1.5){tileEffectTimer=0;takeDamage(1,'lava');}
  if(tile===4){iceDir={...dir};}else{iceDir=null;}
  if(tile===7&&tileEffectTimer>2){tileEffectTimer=0;takeDamage(1,'electric');}
}

function drawMap(){
  const C=getC();
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=tiles[y][x];if(t===0)continue;
    const px=x*GS,py=y*GS;
    if(t===1){ctx.fillStyle=C.wall;ctx.fillRect(px,py,GS,GS);ctx.strokeStyle=C.wallG;ctx.lineWidth=0.5;ctx.strokeRect(px+.5,py+.5,GS-1,GS-1);}
    else if(t===2){ctx.fillStyle='#3a3a4a';ctx.fillRect(px+2,py+2,GS-4,GS-4);}
    else if(t===3){ctx.fillStyle='#ff3d00';ctx.fillRect(px,py,GS,GS);ctx.fillStyle='#ff880044';ctx.fillRect(px+3,py+3,GS-6,GS-6);}
    else if(t===4){ctx.fillStyle='#00d4ff33';ctx.fillRect(px,py,GS,GS);ctx.strokeStyle='#00d4ff66';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+GS/2,py+2);ctx.lineTo(px+GS-2,py+GS/2);ctx.lineTo(px+GS/2,py+GS-2);ctx.lineTo(px+2,py+GS/2);ctx.closePath();ctx.stroke();}
    else if(t===7){ctx.fillStyle='#1a1a00';ctx.fillRect(px,py,GS,GS);ctx.strokeStyle='#ffe14d';ctx.lineWidth=1.5;const et=Date.now()/150;ctx.beginPath();ctx.moveTo(px,py+GS/2);for(let i=0;i<4;i++)ctx.lineTo(px+(i+.5)*(GS/4),py+GS/2+Math.sin(et+i*2)*4);ctx.lineTo(px+GS,py+GS/2);ctx.stroke();}
  }
}

function initSnake(){
  const cx=COLS/2|0,cy=ROWS/2|0;
  snake=[{x:cx,y:cy},{x:cx,y:cy+1},{x:cx,y:cy+2}];
  snakeRender=snake.map(s=>({x:s.x,y:s.y}));
  dir={x:0,y:-1};nextDir={x:0,y:-1};
  moveTimer=0;speed=4;hp=4;maxHp=4;invTimer=2;startDelay=0.5;
  tileEffectTimer=0;secondLifeUsed=false;dashCooldown=0;
  stats.currentPerfect=0;
}

function takeDamage(amount,source){
  if(invTimer>0)return;
  hp-=amount;
  shake(5,0.3);flash('#ff0044',0.2);
  burst(snake[0].x*GS+GS/2,snake[0].y*GS+GS/2,'#ff4444',8);
  playTone(200,0.15);
  if(hp<=0){
    if(!secondLifeUsed&&upgrades.includes('secondLife')){
      secondLifeUsed=true;hp=Math.ceil(maxHp/2);invTimer=3;
      notify('💖 İKİNCİ HAYAT!','#ff44aa');
    }else{die(source||'unknown');}
  }else{invTimer=1.5;notify('⚠️ -'+amount+' HP','#ff4444');}
}

function updateSnake(dt){
  if(startDelay>0){startDelay-=dt;return;}
  for(let i=0;i<snake.length;i++){
    if(snakeRender[i]){snakeRender[i].x=lerp(snakeRender[i].x,snake[i].x,Math.min(1,dt*12));snakeRender[i].y=lerp(snakeRender[i].y,snake[i].y,Math.min(1,dt*12));}
  }
  moveTimer+=dt;
  const interval=1/speed;
  while(moveTimer>=interval){
    moveTimer-=interval;
    if(!iceDir){if(dir.x!==-nextDir.x||dir.y!==-nextDir.y)dir={...nextDir};}
    const head=snake[0];let nx=head.x+dir.x,ny=head.y+dir.y;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS||(tiles[ny]&&tiles[ny][nx]===1)){
      if(invTimer>0)continue;die('wall');return;
    }
    if(invTimer<=0){
      for(let i=1;i<snake.length;i++)if(snake[i].x===nx&&snake[i].y===ny){die('self');return;}
    }
    snake.unshift({x:nx,y:ny});
    snakeRender.unshift({x:snakeRender[0]?snakeRender[0].x:nx,y:snakeRender[0]?snakeRender[0].y:ny});
    while(snake.length>3+level){snake.pop();snakeRender.pop();}
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];if(f.alive&&f.x===nx&&f.y===ny){collectFood(f);foods.splice(i,1);}
    }
  }
  checkTileEffects(dt);
  if(invTimer>0)invTimer-=dt;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1;}}
  if(dashCooldown>0)dashCooldown-=dt;
}

function drawSnake(){
  const now=Date.now();const len=snake.length;if(len===0)return;
  const skin=SKINS.find(s=>s.id===saveData.equippedSkin)||SKINS[0];
  for(let i=len-1;i>=0;i--){
    const s=snakeRender[i]||snake[i];
    const px=s.x*GS+GS/2,py=s.y*GS+GS/2;
    const segT=i/Math.max(1,len-1);const sz=(GS/2-2)*(1-segT*0.25);
    ctx.save();
    if(invTimer>0&&(now/100|0)%2===0)ctx.globalAlpha=0.4;
    if(i===0){
      const g=ctx.createRadialGradient(px-3,py-3,1,px,py,sz+2);
      g.addColorStop(0,skin.head);g.addColorStop(0.7,skin.body);g.addColorStop(1,skin.body+'88');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,sz+2,0,PI2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(px-4,py-4,sz*0.3,0,PI2);ctx.fill();
      const eo=sz*0.35,es=sz*0.22;
      const lx=px+dir.x*3-dir.y*eo,ly=py+dir.y*3+dir.x*eo;
      const rx=px+dir.x*3+dir.y*eo,ry=py+dir.y*3-dir.x*eo;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lx,ly,es+2,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(rx,ry,es+2,0,PI2);ctx.fill();
      ctx.fillStyle=skin.glow;ctx.beginPath();ctx.arc(lx+dir.x*1.5,ly+dir.y*1.5,es*0.7,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(rx+dir.x*1.5,ry+dir.y*1.5,es*0.7,0,PI2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(lx+dir.x*2.5,ly+dir.y*2.5,es*0.4,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(rx+dir.x*2.5,ry+dir.y*2.5,es*0.4,0,PI2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(lx-1,ly-1,es*0.2,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(rx-1,ry-1,es*0.2,0,PI2);ctx.fill();
    }else{
      const g=ctx.createRadialGradient(px-2,py-2,0,px,py,sz);
      g.addColorStop(0,skin.head);g.addColorStop(1,skin.body);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,sz,0,PI2);ctx.fill();
      if(i%2===0){ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(px-1,py-1,sz*0.4,0,PI2);ctx.fill();}
    }
    ctx.restore();
  }
}

function spawnEnemy(){
  const biome=currentBiome;
  const available=ENEMY_TYPES.filter((_,i)=>{
    if(biome===0)return i<3; // Neon City: bug, snake, bomber
    if(biome===1)return i<4; // Frozen Lab: + drone
    if(biome===2)return i<5; // Lava Core: + ghost
    return true; // Others: all
  });
  const def=available[rndInt(0,available.length-1)];
  let x,y,tr=0;
  do{x=rndInt(3,COLS-4);y=rndInt(3,ROWS-4);tr++;}
  while((tiles[y]&&tiles[y][x]!==0||dist(x,y,snake[0].x,snake[0].y)<10)&&tr<30);
  if(tr>=30)return;
  enemies.push({x,y,type:def.type,speed:def.speed,hp:def.hp,color:def.color,ai:def.ai,alive:true,mt:0,anim:0,dir:{x:0,y:-1},rx:x,ry:y});
}

function updateEnemies(dt){
  enemySpawnTimer+=dt;
  if(enemySpawnTimer>=10&&enemies.length<4){enemySpawnTimer=0;spawnEnemy();}
  for(const e of enemies){
    if(!e.alive)continue;e.anim+=dt;
    e.rx=lerp(e.rx,e.x,Math.min(1,dt*10));e.ry=lerp(e.ry,e.y,Math.min(1,dt*10));
    e.mt+=dt;
    if(e.mt>=1/Math.max(0.5,e.speed)){
      e.mt=0;
      if(e.ai==='chase'||e.ai==='aggressive'){
        const dx=snake[0].x-e.x,dy=snake[0].y-e.y;
        if(Math.abs(dx)>Math.abs(dy))e.dir={x:dx>0?1:-1,y:0};else e.dir={x:0,y:dy>0?1:-1};
      }else if(e.ai==='wander'&&Math.random()<0.3){
        e.dir=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}][rndInt(0,3)];
      }
      let nx=e.x+e.dir.x,ny=e.y+e.dir.y;
      if(e.ai==='ghost'){nx=((nx%COLS)+COLS)%COLS;ny=((ny%ROWS)+ROWS)%ROWS;}
      else if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1||(tiles[ny]&&tiles[ny][nx]===1))continue;
      e.x=nx;e.y=ny;
    }
    if(invTimer<=0&&dist(snake[0].x,snake[0].y,e.x,e.y)<1.5){
      takeDamage(1,'enemy');e.x+=e.dir.x*-3;e.y+=e.dir.y*-3;e.rx=e.x;e.ry=e.y;
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    const cx=e.rx*GS+GS/2,cy=e.ry*GS+GS/2,sz=GS/2-2;
    ctx.save();
    if(e.ai==='ghost')ctx.globalAlpha=0.4+Math.sin(e.anim*3)*0.2;
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,e.color);g.addColorStop(1,e.color+'88');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,sz*0.8,0,PI2);ctx.fill();
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(cx-3,cy-3,2,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(cx+3,cy-3,2,0,PI2);ctx.fill();
    ctx.restore();
  }
}

// =====================================================
function spawnBoss(){
  const bossIdx=Math.min(Math.floor(level/5)-1,BOSS_TYPES.length-1);
  const def=BOSS_TYPES[bossIdx];
  bossActive={x:COLS/2|0,y:5,hp:def.hp+level*2,maxHp:def.hp+level*2,color:def.color,name:def.name,anim:0,rx:COLS/2|0,ry:5,attacks:def.attacks,attackTimer:0,phase:0};
  notify('⚠️ '+def.name+' GELİYOR!','#ff0044');
}

function updateBoss(dt){
  if(!bossActive)return;
  bossActive.anim+=dt;bossActive.attackTimer+=dt;
  const dx=snake[0].x-bossActive.x,dy=snake[0].y-bossActive.y;
  bossActive.x+=Math.sign(dx)*dt*1.5;bossActive.y+=Math.sign(dy)*dt*1.5;
  bossActive.rx=lerp(bossActive.rx,bossActive.x,Math.min(1,dt*8));
  bossActive.ry=lerp(bossActive.ry,bossActive.y,Math.min(1,dt*8));
  bossActive.x=clamp(bossActive.x,2,COLS-3);bossActive.y=clamp(bossActive.y,2,ROWS-3);
  if(invTimer<=0&&dist(snake[0].x,snake[0].y,Math.round(bossActive.x),Math.round(bossActive.y))<2)takeDamage(1,'boss');
  // Faz geçişi
  const hpPct=bossActive.hp/bossActive.maxHp;
  if(hpPct<0.5&&bossActive.phase===0){bossActive.phase=1;notify('💢 FAZ 2!','#ff4444');}
  if(hpPct<0.25&&bossActive.phase===1){bossActive.phase=2;notify('💀 FAZ 3!','#ff0044');}
}

function hitBoss(dmg){
  if(!bossActive)return;
  bossActive.hp-=dmg;
  burst(bossActive.rx*GS+GS/2,bossActive.ry*GS+GS/2,bossActive.color,6);
  if(bossActive.hp<=0){
    burst(bossActive.rx*GS+GS/2,bossActive.ry*GS+GS/2,'#ffaa00',20);
    notify('🏆 '+bossActive.name+' YENİLDİ! +50','#ffaa00');
    bossActive=null;score+=50;stats.bossKills++;
    if(stats.bossKills>=1)checkAchievement('boss_hunter');
    if(stats.bossKills>=10)checkAchievement('boss_slayer');
    playTone(800,0.2);
  }
}

function drawBoss(){
  if(!bossActive)return;
  const cx=bossActive.rx*GS+GS/2,cy=bossActive.ry*GS+GS/2,sz=GS*1.3;
  ctx.save();
  const g=ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,sz);
  g.addColorStop(0,'#ff88aa');g.addColorStop(0.5,bossActive.color);g.addColorStop(1,'#880022');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,sz,0,PI2);ctx.fill();
  ctx.strokeStyle=bossActive.color+'44';ctx.lineWidth=2;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(cx,cy,sz*(0.3+i*0.2),bossActive.anim+i*2,bossActive.anim+i*2+4);ctx.stroke();}
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,6,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,6,0,PI2);ctx.fill();
  ctx.fillStyle=bossActive.color;ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,3,0,PI2);ctx.fill();ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,3,0,PI2);ctx.fill();
  const bw=GS*5,bh=8,bx=cx-bw/2,by=cy-sz-15;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#ff0044';ctx.fillRect(bx,by,bw*(bossActive.hp/bossActive.maxHp),bh);
  ctx.fillStyle='#fff';ctx.font='bold 11px Orbitron';ctx.textAlign='center';ctx.fillText(bossActive.name,cx,by-4);
  ctx.restore();
}

// YEM TOPLAMA
// =====================================================
function collectFood(f){
  combo++;comboTimer=2.5;
  comboMult=combo>=12?10:combo>=8?5:combo>=5?3:combo>=3?2:1;
  let sc=(f.sc||0)*comboMult;
  if(upgrades.includes('score2x'))sc*=2;
  score+=sc;
  let xpg=f.xp||0;
  if(upgrades.includes('xp2x'))xpg*=2;
  xp+=xpg;
  if(f.len>0)for(let i=0;i<f.len;i++){snake.push({...snake[snake.length-1]});snakeRender.push({...snakeRender[snakeRender.length-1]});}
  if(f.len<0){for(let i=0;i<Math.abs(f.len);i++){if(snake.length>3){snake.pop();snakeRender.pop();}}}
  if(f.hp>0)hp=Math.min(hp+f.hp,maxHp);
  if(bossActive)hitBoss(1);
  const cx=f.x*GS+GS/2,cy=f.y*GS+GS/2;
  burst(cx,cy,f.color,6);
  if(sc>0)floatText(cx,cy-10,'+'+sc,f.color);
  if(xpg>0)floatText(cx,cy-25,'+'+xpg+' XP','#aa44ff');
  if(f.hp>0)floatText(cx,cy-25,'+'+f.hp+' HP','#ff44aa');
  
  // Özel efektler
  if(f.effect==='slow'){speed*=0.7;setTimeout(()=>speed=Math.min(12,4+level*0.3),3000);}
  if(f.effect==='bomb'){takeDamage(2,'bomb');}
  if(f.effect==='invincible'){invTimer=3;}
  if(f.effect==='coin'){saveData.coins+=rndInt(1,5);}
  if(f.effect==='lucky'){const r=Math.random();if(r<0.3){score+=10;notify('+10 Skor!','#ffaa00');}else if(r<0.6){hp=Math.min(hp+2,maxHp);notify('+2 HP!','#ff44aa');}else{xp+=30;notify('+30 XP!','#aa44ff');}stats.luckyFood++;}
  
  // İstatistikler
  stats.totalFood++;saveData.totalFood++;
  if(f.type==='lucky')stats.luckyFood++;
  if(f.type==='magnet')stats.magnetFood++;
  if(invTimer>0&&upgrades.includes('ghost'))stats.ghostFood++;
  stats.foodTypesEaten=Math.max(stats.foodTypesEaten,FOOD_TYPES.length);
  
  // Level up
  if(xp>=xpNext){xp-=xpNext;level++;xpNext=Math.floor(xpNext*1.15);speed=Math.min(12,4+level*0.3);
    stats.maxLevel=Math.max(stats.maxLevel,level);stats.currentPerfect=level;
    if(level%5===0)spawnBoss();
    showUpgradeScreen();
  }
  if(combo>=3){shake(2,0.1);}
  playTone(440+combo*15,0.06);
  checkAchievement('first_blood');checkAchievement('hungry');checkAchievement('glutton');
}

function die(reason){
  state='dead';hp=0;deadTimer=0;
  stats.totalGames++;saveData.totalGames++;
  stats.totalScore+=score;saveData.totalScore+=score;
  stats.totalTime+=gameTime;saveData.totalTime+=gameTime;
  stats.longestTime=Math.max(stats.longestTime,gameTime);
  stats.perfectLevel=Math.max(stats.perfectLevel,stats.currentPerfect);
  if(score>saveData.highScore)saveData.highScore=score;
  saveData.coins+=Math.floor(score*0.05);
  shake(8,0.4);flash('#ff0044',0.3);
  for(const s of snake)burst(s.x*GS+GS/2,s.y*GS+GS/2,getBiome().accent,5);
  playTone(200,0.25);
  writeSave();
  checkAchievement('survivor');checkAchievement('immortal');checkAchievement('speed_demon');
  checkAchievement('coin_master');checkAchievement('perfect_run');
}

function showUpgradeScreen(){

function applyUpgrade(u){
  upgrades.push(u.id);stats.upgradesUsed++;
  if(u.id==='speed')speed*=1.2;
  if(u.id==='slow')speed*=0.85;
  if(u.id==='hp'){maxHp++;hp++;}
  if(u.id==='heal')hp=maxHp;
  if(u.id==='shield')invTimer=3;
  if(u.id==='longTail'){snake.push({...snake[snake.length-1]});snakeRender.push({...snakeRender[snakeRender.length-1]});}
  if(u.id==='armor'){invTimer=2;}
  if(u.id==='dash'){notify('💨 Dash: SPACE','#00ffcc');}
  notify('⬆️ '+u.name+'!',getC().accent);playTone(660,0.1);
  writeSave();
}

function checkAchievement(id){

  const ach=ACHIEVEMENTS.find(a=>a.id===id);
  if(ach&&ach.check()){
    saveData.achievements.push(id);

    // Skin kilidi kontrolü

        notify('🎨 Yeni Skin: '+skin.name,'#aa44ff');

    }
  }
}

let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(f,d){
  if(!actx)return;
  try{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(saveData.settings.sound*0.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);}catch(e){}
}

// EFEKTLER
// =====================================================
function shake(i,d){if(!saveData.settings.shake)return;shakeX=i;shakeY=i;shakeTimer=d;}
function flash(c,d){flashColor=c;flashTimer=d;}
function updateEffects(dt){
  if(shakeTimer>0){shakeTimer-=dt;const t=shakeTimer;shakeX=(Math.random()-.5)*shakeX*2*t;shakeY=(Math.random()-.5)*shakeY*2*t;}
  else{shakeX=0;shakeY=0;}
  if(flashTimer>0)flashTimer-=dt;
}

addEventListener('keydown',e=>{
  const c=e.code;
  if(c==='ArrowUp'||c==='KeyW'){e.preventDefault();
    if(state==='play')nextDir={x:0,y:-1};
    if(state==='menu')selectedBtn=(selectedBtn-1+4)%4;
    if(state==='howtoplay')howToPlayPage=Math.max(0,howToPlayPage-1);
    if(state==='settings')settingsIdx=Math.max(0,settingsIdx-1);
    if(state==='skins')skinScroll=Math.max(0,skinScroll-1);
  }
  if(c==='ArrowDown'||c==='KeyS'){e.preventDefault();
    if(state==='play')nextDir={x:0,y:1};
    if(state==='menu')selectedBtn=(selectedBtn+1)%4;
    if(state==='howtoplay')howToPlayPage=Math.min(2,howToPlayPage+1);
    if(state==='settings')settingsIdx=Math.min(4,settingsIdx+1);
    if(state==='skins')skinScroll=Math.min(SKINS.length-1,skinScroll+1);
  }
  if(c==='ArrowLeft'||c==='KeyA'){e.preventDefault();
    if(state==='play')nextDir={x:-1,y:0};
    if(state==='levelup')selectedUpgrade=(selectedUpgrade-1+3)%3;
    if(state==='howtoplay')howToPlayPage=Math.max(0,howToPlayPage-1);
  }
  if(c==='ArrowRight'||c==='KeyD'){e.preventDefault();
    if(state==='play')nextDir={x:1,y:0};
    if(state==='levelup')selectedUpgrade=(selectedUpgrade+1)%3;
    if(state==='howtoplay')howToPlayPage=Math.min(2,howToPlayPage+1);
  }
  if(c==='Space'&&state==='play'){
    e.preventDefault();
    if(dashCooldown<=0&&upgrades.includes('dash')){
      dashCooldown=2;
      for(let i=0;i<3;i++){const head=snake[0];const nx=head.x+dir.x,ny=head.y+dir.y;
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&(!tiles[ny]||tiles[ny][nx]!==1)){
          snake.unshift({x:nx,y:ny});snakeRender.unshift({x:snakeRender[0].x,y:snakeRender[0].y});
          while(snake.length>3+level){snake.pop();snakeRender.pop();}
        }
      }
      burst(snake[0].x*GS+GS/2,snake[0].y*GS+GS/2,'#00ffcc',8);playTone(600,0.1);
    }
  }
  if(c==='Enter'||c==='Space'){
    e.preventDefault();initAudio();
    if(state==='menu'){
      if(selectedBtn===0)startGame();
      else if(selectedBtn===1){state='howtoplay';howToPlayPage=0;}
      else if(selectedBtn===2){state='skins';skinScroll=0;}
      else if(selectedBtn===3){state='settings';settingsIdx=0;}
    }
    if(state==='dead')startGame();
    if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    if(state==='howtoplay')state='menu';
    if(state==='settings')state='menu';
    if(state==='skins'){
      // Skin seç
      const skin=SKINS[skinScroll];
      if(saveData.unlockedSkins.includes(skin.id)){
        saveData.equippedSkin=skin.id;writeSave();
        notify('🎨 '+skin.name+' giyildi!','#aa44ff');
      }else{
        notify('🔒 Kilitli!','#ff4444');
      }
    }
  }
  if(c==='Escape'){
    if(state==='play')state='menu';
    else if(state==='dead')state='menu';
    else if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    else state='menu';
  }
  if(state==='levelup'){
    if(c==='Digit1'){applyUpgrade(upgradeChoices[0]);state='play';}
    if(c==='Digit2'){applyUpgrade(upgradeChoices[1]);state='play';}
    if(c==='Digit3'){applyUpgrade(upgradeChoices[2]);state='play';}
  }
});

let touchStart=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,time:Date.now()}},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y,d=Math.hypot(dx,dy);
  if(d<15){
    if(state==='menu'){if(selectedBtn===0)startGame();else if(selectedBtn===1){state='howtoplay';}else if(selectedBtn===2){state='skins';}else if(selectedBtn===3){state='settings';}}
    if(state==='dead')startGame();
    if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play';}
    if(state==='howtoplay'||state==='settings'||state==='skins')state='menu';
  }else if(d>30&&state==='play'){
    if(Math.abs(dx)>Math.abs(dy))nextDir={x:dx>0?1:-1,y:0};else nextDir={x:0,y:dy>0?1:-1};
  }
  touchStart=null;
},{passive:false});

// =====================================================
// ANA DÖNGÜ
// =====================================================
function startGame(){
  state='play';score=0;level=1;xp=0;xpNext=30;
  combo=0;comboTimer=0;comboMult=1;
  gameTime=0;upgrades=[];enemies=[];enemySpawnTimer=0;
  bossActive=null;foods=[];particles=[];notifications=[];
  startDelay=0.5;tileEffectTimer=0;
  currentBiome=0;
  genMap();initSnake();
  for(let i=0;i<6;i++)spawnFood();
  notify('🎮 Başla! WASD/Ok ile hareket',getC().accent);
}

let lastTime=0,fpsCounter=0,fpsTime=0,currentFps=0;

function loop(now){
  const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  fpsCounter++;if(now-fpsTime>=1000){currentFps=fpsCounter;fpsCounter=0;fpsTime=now;}
  
  if(state==='play'){
    gameTime+=dt;
    updateSnake(dt);updateEnemies(dt);updateBoss(dt);
    foodTimer+=dt;if(foodTimer>=2){foodTimer=0;spawnFood();}
    if(upgrades.includes('magnet')&&snake.length>0){
      for(const f of foods){if(!f.alive)continue;const d=dist(snake[0].x,snake[0].y,f.x,f.y);
        if(d<5&&d>0.5){const a=Math.atan2(snake[0].y-f.y,snake[0].x-f.x);f.x+=Math.cos(a)*0.15;f.y+=Math.sin(a)*0.15;}}
    }
    // Biome değişimi
    const newBiome=Math.min(Math.floor(level/5),BIOMES.length-1);
    if(newBiome!==currentBiome){currentBiome=newBiome;genMap();notify('🌍 '+getBiome().name,getBiome().accent);stats.biomesVisited=Math.max(stats.biomesVisited,currentBiome+1);checkAchievement('explorer');}
  }
  
  updateParticles(dt);updateEffects(dt);updateNotifications(dt);
  
  ctx.save();const s=Math.min(innerWidth/W,innerHeight/H);ctx.setTransform(s,0,0,s,0,0);
  ctx.fillStyle=getC().bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=getC().grid;ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.translate(shakeX,shakeY);
  
  switch(state){
    case'menu':drawMenu();break;
    case'play':drawMap();drawFood();drawEnemies();drawBoss();drawSnake();drawParticles();drawHUD();drawMiniMap();break;
    case'dead':drawMap();drawParticles();drawDead();break;
    case'levelup':drawMap();drawFood();drawSnake();drawParticles();drawHUD();drawLevelUp();break;
    case'howtoplay':drawHowToPlay();break;
    case'settings':drawSettings();break;
    case'skins':drawSkins();break;
  }
  drawNotifications();
  if(flashTimer>0&&flashColor){ctx.globalAlpha=flashTimer;ctx.fillStyle=flashColor;ctx.fillRect(-20,-20,W+40,H+40);ctx.globalAlpha=1;}
  ctx.restore();
  requestAnimationFrame(loop);
}

// =====================================================
// MENÜ
// =====================================================
function drawMenu(){
  const C=getC();
  ctx.save();ctx.shadowColor=C.accent;ctx.shadowBlur=15;
  ctx.fillStyle=C.accent;ctx.font='900 46px Orbitron';ctx.textAlign='center';
  ctx.fillText('SNAKE',W/2|0,90);
  ctx.fillStyle=C.accent2;ctx.shadowColor=C.accent2;
  ctx.fillText('EVOLUTION',W/2|0,135);ctx.restore();
  
  const lg=ctx.createLinearGradient(W/2-180,0,W/2+180,0);
  lg.addColorStop(0,C.accent+'00');lg.addColorStop(0.5,C.accent);lg.addColorStop(1,C.accent+'00');
  ctx.strokeStyle=lg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2-180,155);ctx.lineTo(W/2+180,155);ctx.stroke();
  
  ctx.fillStyle='#55667788';ctx.font='12px Rajdhani';ctx.textAlign='center';
  ctx.fillText('A ROGUELIKE SNAKE EXPERIENCE',W/2|0,170);
  
  const btns=['▶  PLAY','📖  HOW TO PLAY','🎨  SKINS','⚙  SETTINGS'];
  const sy=210,sp=46,bw=260,bh=38;
  for(let i=0;i<4;i++){
    const y=sy+i*sp,sel=i===selectedBtn,bx=W/2-bw/2;
    ctx.save();
    if(sel){ctx.fillStyle=C.accent+'15';ctx.fillRect(bx,y-bh/2,bw,bh);ctx.fillStyle=C.accent;ctx.fillRect(bx,y-bh/2+4,2,bh-8);}
    ctx.strokeStyle=sel?C.accent+'44':'#fff1';ctx.lineWidth=1;ctx.strokeRect(bx,y-bh/2,bw,bh);
    ctx.fillStyle=sel?C.accent:'#667788';ctx.font=(sel?'bold ':'')+'15px Rajdhani';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(btns[i],W/2|0,y|0);ctx.restore();
  }
  
  // İstatistikler
  ctx.fillStyle='#333344';ctx.font='11px monospace';ctx.textAlign='left';
  ctx.fillText('High Score: '+saveData.highScore,10,H-30);
  ctx.fillText('Games: '+saveData.totalGames+' | Coins: '+saveData.coins,10,H-18);
  ctx.fillText('v4.0',10,H-6);
  
  ctx.fillStyle='#55667788';ctx.font='11px Rajdhani';ctx.textAlign='center';
  ctx.fillText('↑↓ Navigate  •  ENTER Select',W/2|0,H-6);
}

// =====================================================
// HOW TO PLAY
// =====================================================
function drawHowToPlay(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  const pages=[
    {title:'Kontroller',lines:['↑↓←→ veya WASD — Hareket','SPACE — Dash (varsa)','ENTER — Seçim / Başla','ESC — Geri / Menü','1-2-3 — Upgrade seç']},
    {title:'Yemler',lines:['🍎 Elma — +1 puan','⭐ Altın Elma — +5 puan','💎 Kristal — +25 XP','❤️ Kalp — +1 can','⏱️ Saat — Yavaşlatma','💣 Bomba — Hasar!','☠️ Zehir — Kuyruk kısaltır','🧲 Mıknatıs — Yem çeker','🍀 Şanslı — Rastgele','✨ Yıldız — Dokunulmaz','🪙 Coin — Para']},
    {title:'İpuçları',lines:['Yemleri ye, level atla','Her 5 levelde boss savaşı','Combo ile daha fazla puan','Düşmanlara dikkat!','Engeller hasar verir (lava, elektrik)','Farklı biome lar farklı düşmanlar','Boss ları yen, efsanevi upgrade al']}
  ];
  const p=pages[howToPlayPage]||pages[0];
  ctx.fillStyle=getC().accent;ctx.font='bold 28px Orbitron';ctx.textAlign='center';ctx.fillText(p.title,W/2|0,80);
  ctx.fillStyle='#ccccee';ctx.font='16px Rajdhani';let y=130;
  for(const line of p.lines){ctx.fillText(line,W/2|0,y);y+=28;}
  ctx.fillStyle='#666677';ctx.font='13px Rajdhani';ctx.textAlign='center';
  ctx.fillText('Sayfa '+(howToPlayPage+1)+'/3  •  ← →  •  ESC',W/2|0,H-30);
}

// =====================================================
// SETTINGS
// =====================================================
function drawSettings(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=getC().accent;ctx.font='bold 28px Orbitron';ctx.textAlign='center';ctx.fillText('AYARLAR',W/2|0,80);
  const items=[
    {label:'Ses',val:Math.round(saveData.settings.sound*100)+'%'},
    {label:'Müzik',val:Math.round(saveData.settings.music*100)+'%'},
    {label:'Ekran Sarsıntısı',val:saveData.settings.shake?'AÇIK':'KAPALI'},
    {label:'Parçacıklar',val:saveData.settings.particles?'AÇIK':'KAPALI'},
    {label:'Kaydı Sıfırla',val:''}
  ];
  let y=140;
  for(let i=0;i<items.length;i++){
    const sel=i===settingsIdx;
    ctx.fillStyle=sel?getC().accent:'#888899';ctx.font=(sel?'bold ':'')+'16px Rajdhani';ctx.textAlign='center';
    ctx.fillText(items[i].label+': '+items[i].val,W/2|0,y);y+=30;
  }
  ctx.fillStyle='#666677';ctx.font='13px Rajdhani';ctx.textAlign='center';
  ctx.fillText('↑↓ Seç  •  ← → Değiştir  •  ESC',W/2|0,H-30);
}

// =====================================================
// SKİNLER
// =====================================================
let skinScroll=0;
function drawSkins(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=getC().accent;ctx.font='bold 28px Orbitron';ctx.textAlign='center';ctx.fillText('SKİNLER',W/2|0,50);
  
  const startY=80;
  for(let i=0;i<Math.min(8,SKINS.length);i++){
    const idx=skinScroll+i;if(idx>=SKINS.length)break;
    const skin=SKINS[idx];
    const unlocked=saveData.unlockedSkins.includes(skin.id);
    const equipped=saveData.equippedSkin===skin.id;
    const y=startY+i*55;
    
    ctx.save();
    ctx.fillStyle=equipped?getC().accent+'22':'#111122';
    ctx.fillRect(100,y,600,45);
    ctx.strokeStyle=unlocked?skin.glow+'66':'#333';ctx.lineWidth=1;
    ctx.strokeRect(100,y,600,45);
    
    // Skin preview
    const g=ctx.createRadialGradient(130,y+22,0,130,y+22,12);
    g.addColorStop(0,skin.head);g.addColorStop(1,skin.body);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(130,y+22,12,0,PI2);ctx.fill();
    
    ctx.fillStyle=unlocked?'#fff':'#555';ctx.font='bold 15px Rajdhani';ctx.textAlign='left';
    ctx.fillText(skin.name,160,y+20);
    ctx.fillStyle=unlocked?'#888':'#444';ctx.font='12px Rajdhani';
    ctx.fillText(unlocked?(equipped?'✓ Giyili':'Kilidi Açık'):getSkinUnlockText(skin),160,y+36);
    
    ctx.restore();
  }
  
  ctx.fillStyle='#666677';ctx.font='13px Rajdhani';ctx.textAlign='center';
  ctx.fillText('↑↓ Seç  •  ENTER Giy  •  ESC',W/2|0,H-20);
}

function getSkinUnlockText(skin){
  if(!skin.unlock)return'Ücretsiz';
  if(skin.unlock.coins)return skin.unlock.coins+' Coin';
  if(skin.unlock.gems)return skin.unlock.gems+' Gem';
  if(skin.unlock.achievement){const a=ACHIEVEMENTS.find(a=>a.id===skin.unlock.achievement);return a?'Başarım: '+a.name:'Başarım';}
  return'Kilitli';
}

// =====================================================
// HUD
// =====================================================
function drawHUD(){
  const C=getC();
  ctx.fillStyle=C.accent;ctx.font='bold 20px monospace';ctx.textAlign='left';
  ctx.fillText('SKOR: '+score,15,25);
  ctx.fillStyle='#888899';ctx.font='14px Rajdhani';ctx.fillText('LVL '+level,15,45);
  const bw=100,bh=4,bx=55,by=40;
  ctx.fillStyle='#1a1a2a';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=C.accent;ctx.fillRect(bx,by,bw*(xp/xpNext),bh);
  for(let i=0;i<maxHp;i++){ctx.fillStyle=i<hp?'#ff44aa':'#333344';ctx.font='13px Arial';ctx.fillText('❤️',16+i*18,62);}
  if(combo>=3){ctx.fillStyle='#ffaa00';ctx.font='bold 20px Orbitron';ctx.textAlign='center';ctx.fillText('x'+combo+' COMBO',W/2|0,45);if(comboMult>1){ctx.fillStyle='#fff';ctx.font='bold 13px Orbitron';ctx.fillText('('+comboMult+'x)',W/2|0,60);}}
  if(bossActive){const bw2=W*0.5,bh2=8,bx2=(W-bw2)/2,by2=H-30;ctx.fillStyle='#0a0a1a';ctx.fillRect(bx2-1,by2-1,bw2+2,bh2+2);ctx.fillStyle='#ff0044';ctx.fillRect(bx2,by2,bw2*(bossActive.hp/bossActive.maxHp),bh2);}
  ctx.fillStyle='#333';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText(currentFps+' FPS',W-10,14);
}

// =====================================================
// MİNİ HARİTA
// =====================================================
function drawMiniMap(){
  const mw=60,mh=45,mx=W-mw-10,my=H-mh-10;
  const sx=mw/COLS,sy=mh/ROWS;
  ctx.globalAlpha=0.4;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(mx,my,mw,mh);
  ctx.fillStyle=getBiome().accent;
  if(snake.length>0){ctx.fillRect(mx+snake[0].x*sx,my+snake[0].y*sy,2,2);}
  ctx.fillStyle='#ff4444';
  for(const e of enemies){if(e.alive)ctx.fillRect(mx+e.x*sx,my+e.y*sy,1.5,1.5);}
  ctx.fillStyle='#ffaa00';
  for(const f of foods){if(f.alive)ctx.fillRect(mx+f.x*sx,my+f.y*sy,1.5,1.5);}
  ctx.globalAlpha=1;
}

// =====================================================
// LEVEL UP
// =====================================================
function drawLevelUp(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.shadowColor='#ffaa00';ctx.shadowBlur=12;
  ctx.fillStyle='#ffaa00';ctx.font='bold 30px Orbitron';ctx.textAlign='center';
  ctx.fillText('LEVEL UP!',W/2|0,90);ctx.restore();
  const cw=170,ch=190,sp=25,tw=3*cw+2*sp,sx=(W-tw)/2;
  for(let i=0;i<3;i++){
    const u=upgradeChoices[i];if(!u)continue;
    const x=sx+i*(cw+sp),y=130,sel=i===selectedUpgrade;
    ctx.save();
    const rarityColor={common:'#888',uncommon:'#00ff88',rare:'#0088ff',epic:'#aa00ff',legendary:'#ffaa00'}[u.rarity]||'#888';
    const cg=ctx.createLinearGradient(x,y,x,y+ch);
    cg.addColorStop(0,sel?'#1a1a3a':'#0e0e1e');cg.addColorStop(1,sel?'#0a0a2a':'#060612');
    ctx.fillStyle=cg;ctx.fillRect(x,y,cw,ch);
    ctx.strokeStyle=sel?rarityColor+'88':'#fff1';ctx.lineWidth=sel?2:1;ctx.strokeRect(x,y,cw,ch);
    ctx.fillStyle=rarityColor+'22';ctx.fillRect(x,y,cw,22);
    ctx.fillStyle=rarityColor;ctx.font='bold 9px Orbitron';ctx.textAlign='center';ctx.fillText(u.rarity.toUpperCase(),x+cw/2|0,y+14|0);
    ctx.font='32px Arial';ctx.textBaseline='middle';ctx.fillText(u.icon,x+cw/2|0,y+55|0);
    ctx.fillStyle='#fff';ctx.font='bold 13px Orbitron';ctx.fillText(u.name,x+cw/2|0,y+85|0);
    ctx.fillStyle='#b0b0cc';ctx.font='12px Rajdhani';ctx.fillText(u.desc,x+cw/2|0,y+105|0);
    ctx.fillStyle=sel?'#fff':'#555566';ctx.font='bold 12px monospace';ctx.fillText('['+(i+1)+']',x+cw/2|0,y+ch-8|0);
    ctx.restore();
  }
  ctx.fillStyle='#888899';ctx.font='12px Rajdhani';ctx.textAlign='center';
  ctx.fillText('1-3 ile seç',W/2|0,H-40);
}

// =====================================================
// GAME OVER
// =====================================================
function drawDead(){
  deadTimer+=0.016;
  const og=ctx.createRadialGradient(W/2,H/3,0,W/2,H/2,H);
  og.addColorStop(0,'rgba(20,0,0,0.85)');og.addColorStop(1,'rgba(0,0,0,0.95)');
  ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.shadowColor='#ff0044';ctx.shadowBlur=12;
  ctx.fillStyle='#ff0044';ctx.font='900 38px Orbitron';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2|0,100);ctx.restore();
  const items=[{l:'SKOR',v:score,c:getBiome().accent},{l:'SÜRE',v:Math.floor(gameTime)+'s',c:'#888899'},{l:'LEVEL',v:level,c:'#ffaa00'},{l:'COMBO',v:'x'+combo,c:'#ffaa00'},{l:'BOSS',v:stats.bossKills,c:'#ff4488'}];
  let y=150;
  for(const it of items){ctx.fillStyle='#556677';ctx.font='11px Orbitron';ctx.textAlign='right';ctx.fillText(it.l,W/2-15,y);ctx.fillStyle=it.c;ctx.font='bold 15px monospace';ctx.textAlign='left';ctx.fillText(''+it.v,W/2+15,y);y+=25;}
  y+=10;ctx.fillStyle='#fff';ctx.font='bold 13px Orbitron';ctx.textAlign='center';ctx.fillText('ÖDÜLLER',W/2|0,y);
  y+=20;ctx.fillStyle=getBiome().accent;ctx.font='bold 15px monospace';ctx.fillText('+'+level*10+' XP  +'+(score*0.05|0)+' Coin',W/2|0,y|0);
  y=H-80;ctx.fillStyle=getBiome().accent;ctx.font='bold 16px Rajdhani';ctx.textAlign='center';ctx.fillText('▶ TEKRAR OYNA (ENTER)',W/2|0,y|0);
  ctx.fillStyle='#666677';ctx.fillText('◀ ANA MENÜ (ESC)',W/2|0,y+25|0);
}

// =====================================================
// BAŞLAT
// =====================================================
requestAnimationFrame(loop);
</script>
