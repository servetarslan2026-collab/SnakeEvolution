<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Rajdhani',sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// =====================================================
// SNAKE EVOLUTION — 144 FPS Optimized
// =====================================================
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:false});
const W=800,H=600,GS=20;
const COLS=W/GS,ROWS=H/GS;
const PI2=Math.PI*2;

// Offscreen canvas (grid cache)
const gridCanvas=document.createElement('canvas');
gridCanvas.width=W; gridCanvas.height=H;
const gridCtx=gridCanvas.getContext('2d',{alpha:false});

function resize(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  canvas.width=W*s|0; canvas.height=H*s|0;
  canvas.style.width=W*s+'px'; canvas.style.height=H*s+'px';
  ctx.setTransform(s,0,0,s,0,0);
}
resize(); addEventListener('resize',resize);

// =====================================================
// DURUM
// =====================================================
let state='menu',score=0,level=1,xp=0,xpNext=30;
let combo=0,comboTimer=0,comboMult=1;
let shakeX=0,shakeY=0,shakeTimer=0;
let flashColor=null,flashTimer=0;
let gameTime=0,particles=[],notifications=[];
let upgrades=[],hp=4,maxHp=4,invTimer=0;
let bossActive=null,bossHp=0,bossMaxHp=0;
let enemies=[],enemySpawnTimer=0;
let selectedBtn=0,selectedUpgrade=0,upgradeChoices=[];
let deadTimer=0,foodTimer=0;
let snake=[],dir={x:0,y:-1},nextDir={x:0,y:-1};
let moveTimer=0,speed=6;
let foods=[],tiles=[];
let gridDirty=true;

// =====================================================
// RENKLER
// =====================================================
const C={bg:'#06060f',grid:'#0c0c1e',gridA:'#121230',wall:'#14142e',wallG:'#1e1e48',
  accent:'#00ffd5',accent2:'#ff2d95',accent3:'#ffe14d',
  lava:'#ff3d00',ice:'#00d4ff',bush:'#003828',electric:'#ffe14d',portal:'#b44dff'};

// =====================================================
// YARDIMCI (inline, hızlı)
// =====================================================
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return rnd(a,b+1)|0}
function dist(x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1;return Math.sqrt(dx*dx+dy*dy)}
function clamp(v,a,b){return v<a?a:v>b?b:v}

// =====================================================
// GRID CACHE (bir kere çiz, tekrar kullan)
// =====================================================
function renderGrid(){
  const g=gridCtx;
  g.fillStyle=C.bg; g.fillRect(0,0,W,H);
  g.strokeStyle=C.grid; g.lineWidth=0.5;
  for(let x=0;x<=W;x+=GS){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke()}
  for(let y=0;y<=H;y+=GS){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}
  g.strokeStyle=C.gridA; g.lineWidth=1;
  for(let x=0;x<=W;x+=GS*5){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke()}
  for(let y=0;y<=H;y+=GS*5){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}
  gridDirty=false;
}

// =====================================================
// PARÇACIK (basit, hızlı)
// =====================================================
function emit(x,y,vx,vy,life,sz,col){
  if(particles.length>200)return;
  particles.push({x,y,vx,vy,life,ml:life,sz,col:col||C.accent});
}
function burst(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=rnd(0,PI2),s=rnd(40,100);
    emit(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.2,0.5),rnd(2,3),col);
  }
}
function ring(x,y,col,r){
  for(let i=0;i<12;i++){
    const a=PI2*i/12;
    emit(x,y,Math.cos(a)*r,Math.sin(a)*r,0.3,2,col);
  }
}
function floatText(x,y,txt,col){particles.push({x,y,vx:0,vy:-50,life:0.7,ml:0.7,sz:14,col,txt,shape:'text'})}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.96; p.vy*=0.96; p.vy+=40*dt;
  }
}
function drawParticles(){
  for(const p of particles){
    const a=p.life/p.ml;
    ctx.globalAlpha=a; ctx.fillStyle=p.col;
    if(p.shape==='text'){
      ctx.font='bold '+p.sz+'px Orbitron'; ctx.textAlign='center';
      ctx.fillText(p.txt,p.x|0,p.y|0);
    } else {
      ctx.fillRect((p.x-p.sz*a/2)|0,(p.y-p.sz*a/2)|0,p.sz*a|0,p.sz*a|0);
    }
  }
  ctx.globalAlpha=1;
}

// =====================================================
// BİLDİRİMLER
// =====================================================
function notify(t,c){if(notifications.length<5)notifications.push({t,c:c||'#fff',tm:2})}
function updateNotifications(dt){for(let i=notifications.length-1;i>=0;i--){notifications[i].tm-=dt;if(notifications[i].tm<=0)notifications.splice(i,1)}}
function drawNotifications(){
  let y=100;
  for(const n of notifications){
    ctx.globalAlpha=Math.min(1,n.tm); ctx.fillStyle=n.c;
    ctx.font='bold 15px Rajdhani'; ctx.textAlign='center';
    ctx.fillText(n.t,W/2|0,y); y+=22;
  }
  ctx.globalAlpha=1;
}

// =====================================================
// HARİTA
// =====================================================
function genMap(){
  tiles=[];
  for(let y=0;y<ROWS;y++){
    tiles[y]=new Uint8Array(COLS);
    for(let x=0;x<COLS;x++){
      if(x===0||x===COLS-1||y===0||y===ROWS-1)tiles[y][x]=1;
    }
  }
  for(let i=0;i<6;i++){
    const x=rndInt(3,COLS-4),y=rndInt(3,ROWS-4);
    tiles[y][x]=rndInt(2,4);
  }
  const cx=COLS/2|0,cy=ROWS/2|0;
  for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
    const nx=cx+dx,ny=cy+dy;
    if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1)tiles[ny][nx]=0;
  }
  gridDirty=true;
}

function drawMap(){
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=tiles[y][x]; if(t===0)continue;
    const px=x*GS,py=y*GS;
    if(t===1){ctx.fillStyle=C.wall;ctx.fillRect(px,py,GS,GS);ctx.strokeStyle=C.wallG;ctx.lineWidth=0.5;ctx.strokeRect(px+.5,py+.5,GS-1,GS-1)}
    else if(t===2){ctx.fillStyle='#3a3a4a';ctx.fillRect(px+2,py+2,GS-4,GS-4)}
    else if(t===3){ctx.fillStyle=C.lava;ctx.fillRect(px,py,GS,GS);ctx.fillStyle='#ff880044';ctx.fillRect(px+3,py+3,GS-6,GS-6)}
    else if(t===4){ctx.fillStyle=C.ice+'33';ctx.fillRect(px,py,GS,GS);ctx.strokeStyle=C.ice+'66';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+GS/2,py+2);ctx.lineTo(px+GS-2,py+GS/2);ctx.lineTo(px+GS/2,py+GS-2);ctx.lineTo(px+2,py+GS/2);ctx.closePath();ctx.stroke()}
  }
}

// =====================================================
// YEM
// =====================================================
const FOOD_TYPES=[
  {type:'normal',color:'#ff2244',w:50,sc:1,len:1,xp:0,hp:0,icon:'🍎'},
  {type:'golden',color:'#ffaa00',w:12,sc:5,len:2,xp:0,hp:0,icon:'⭐'},
  {type:'crystal',color:'#aa44ff',w:10,sc:0,len:0,xp:25,hp:0,icon:'💎'},
  {type:'heart',color:'#ff44aa',w:8,sc:0,len:0,xp:0,hp:1,icon:'❤️'},
  {type:'clock',color:'#4488ff',w:5,sc:0,len:0,xp:0,hp:0,icon:'⏱️'},
  {type:'magnet',color:'#00ffcc',w:4,sc:0,len:0,xp:0,hp:0,icon:'🧲'},
  {type:'star',color:'#ffffff',w:3,sc:0,len:0,xp:0,hp:0,icon:'✨'},
  {type:'coin',color:'#ffcc00',w:5,sc:0,len:0,xp:0,hp:0,icon:'🪙'}
];
function pickFood(){let r=Math.random()*100;for(const f of FOOD_TYPES){r-=f.w;if(r<=0)return f.type}return'normal'}

function spawnFood(){
  if(foods.length>=8)return;
  const type=pickFood(),def=FOOD_TYPES.find(f=>f.type===type);
  let x,y,tr=0;
  do{x=rndInt(2,COLS-3);y=rndInt(2,ROWS-3);tr++}while(tiles[y][x]!==0&&tr<30);
  if(tr>=30)return;
  foods.push({x,y,type,...def,anim:rnd(0,6.28),alive:true});
}

function drawFood(){
  const now=Date.now();
  for(const f of foods){
    if(!f.alive)continue;
    const cx=f.x*GS+GS/2,cy=f.y*GS+GS/2;
    const pulse=Math.sin(now/300+f.anim)*0.12+1;
    const sz=(GS/2-2)*pulse;
    
    // Gradient daire
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.3,f.color); g.addColorStop(1,f.color+'88');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,sz,0,PI2); ctx.fill();
    
    // Emoji
    ctx.fillStyle='#fff';
    ctx.font=(sz*.7|0)+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.icon,cx,cy);
  }
}

// =====================================================
// YILAN
// =====================================================
function initSnake(){
  const cx=COLS/2|0,cy=ROWS/2|0;
  snake=[{x:cx,y:cy},{x:cx,y:cy+1},{x:cx,y:cy+2}];
  dir={x:0,y:-1}; nextDir={x:0,y:-1};
  moveTimer=0; speed=6; hp=4; maxHp=4; invTimer=1.5;
}

function updateSnake(dt){
  moveTimer+=dt;
  const interval=1/speed;
  while(moveTimer>=interval){
    moveTimer-=interval;
    if(dir.x!==-nextDir.x||dir.y!==-nextDir.y)dir={...nextDir};
    const head=snake[0];
    let nx=head.x+dir.x,ny=head.y+dir.y;
    
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS||tiles[ny][nx]===1){
      if(invTimer<=0){die('wall');return}
      continue;
    }
    if(invTimer<=0){
      for(let i=1;i<snake.length;i++)if(snake[i].x===nx&&snake[i].y===ny){die('self');return}
      for(const e of enemies)if(e.alive&&e.x===nx&&e.y===ny){die('enemy');return}
      if(bossActive&&dist(nx,ny,bossActive.x,bossActive.y)<2){die('boss');return}
    }
    
    snake.unshift({x:nx,y:ny});
    while(snake.length>3+level)snake.pop();
    
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];
      if(f.alive&&f.x===nx&&f.y===ny){collectFood(f);foods.splice(i,1)}
    }
  }
  if(invTimer>0)invTimer-=dt;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;comboMult=1}}
}

function drawSnake(){
  const now=Date.now();
  const len=snake.length;
  
  for(let i=len-1;i>=0;i--){
    const s=snake[i];
    const px=s.x*GS+GS/2,py=s.y*GS+GS/2;
    const segT=i/Math.max(1,len-1);
    const sz=(GS/2-2)*(1-segT*0.3);
    
    ctx.save();
    if(invTimer>0&&(now/100|0)%2===0)ctx.globalAlpha=0.4;
    
    if(i===0){
      // KAFA - gradient daire + gözler
      const g=ctx.createRadialGradient(px-3,py-3,1,px,py,sz+2);
      g.addColorStop(0,'#66ffdd'); g.addColorStop(0.7,C.accent); g.addColorStop(1,'#008866');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(px,py,sz+2,0,PI2); ctx.fill();
      
      // Highlight
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(px-4,py-4,sz*0.3,0,PI2); ctx.fill();
      
      // Gözler
      const eo=sz*0.35,es=sz*0.22;
      const lx=px+dir.x*3-dir.y*eo,ly=py+dir.y*3+dir.x*eo;
      const rx=px+dir.x*3+dir.y*eo,ry=py+dir.y*3-dir.x*eo;
      
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(lx,ly,es+2,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx,ry,es+2,0,PI2);ctx.fill();
      
      ctx.fillStyle=C.accent;
      ctx.beginPath();ctx.arc(lx+dir.x*1.5,ly+dir.y*1.5,es*0.7,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx+dir.x*1.5,ry+dir.y*1.5,es*0.7,0,PI2);ctx.fill();
      
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(lx+dir.x*2.5,ly+dir.y*2.5,es*0.4,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx+dir.x*2.5,ry+dir.y*2.5,es*0.4,0,PI2);ctx.fill();
      
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();ctx.arc(lx-1,ly-1,es*0.2,0,PI2);ctx.fill();
      ctx.beginPath();ctx.arc(rx-1,ry-1,es*0.2,0,PI2);ctx.fill();
      
    } else {
      // GÖVDE - gradient daire
      const g=ctx.createRadialGradient(px-2,py-2,0,px,py,sz);
      g.addColorStop(0,'#44ddbb'); g.addColorStop(1,'#00aa88');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(px,py,sz,0,PI2); ctx.fill();
      
      // Segment deseni
      if(i%2===0){
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath(); ctx.arc(px-1,py-1,sz*0.4,0,PI2); ctx.fill();
      }
    }
    ctx.restore();
  }
}

// =====================================================
// DÜŞMANLAR
// =====================================================
function spawnEnemy(){
  const types=['bug','chaser','ghost'];
  const type=types[rndInt(0,2)];
  let x,y,tr=0;
  do{x=rndInt(3,COLS-4);y=rndInt(3,ROWS-4);tr++}while((tiles[y][x]!==0||dist(x,y,snake[0].x,snake[0].y)<8)&&tr<30);
  if(tr>=30)return;
  const d={bug:{sp:2,hp:1,col:'#ff2244'},chaser:{sp:3,hp:1,col:'#ff4444'},ghost:{sp:1.5,hp:999,col:'#aaaaff'}}[type];
  enemies.push({x,y,type,...d,alive:true,mt:0,anim:0,dir:{x:0,y:-1}});
}

function updateEnemies(dt){
  enemySpawnTimer+=dt;
  if(enemySpawnTimer>=8&&enemies.length<4){enemySpawnTimer=0;spawnEnemy()}
  for(const e of enemies){
    if(!e.alive)continue;
    e.anim+=dt; e.mt+=dt;
    if(e.mt>=1/e.sp){
      e.mt=0;
      if(e.type==='chaser'){
        const dx=snake[0].x-e.x,dy=snake[0].y-e.y;
        e.dir=Math.abs(dx)>Math.abs(dy)?{x:dx>0?1:-1,y:0}:{x:0,y:dy>0?1:-1};
      }else if(e.type==='bug'&&Math.random()<0.3){
        e.dir=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}][rndInt(0,3)];
      }
      let nx=e.x+e.dir.x,ny=e.y+e.dir.y;
      if(e.type==='ghost'){nx=((nx%COLS)+COLS)%COLS;ny=((ny%ROWS)+ROWS)%ROWS}
      else if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1||tiles[ny][nx]===1)continue;
      e.x=nx;e.y=ny;
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    const cx=e.x*GS+GS/2,cy=e.y*GS+GS/2,sz=GS/2-2;
    ctx.save();
    if(e.type==='ghost')ctx.globalAlpha=0.4+Math.sin(e.anim*3)*0.2;
    const g=ctx.createRadialGradient(cx-2,cy-2,0,cx,cy,sz);
    g.addColorStop(0,e.col); g.addColorStop(1,e.col+'88');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,sz*0.8,0,PI2); ctx.fill();
    ctx.fillStyle='#f00';
    ctx.beginPath();ctx.arc(cx-3,cy-3,2,0,PI2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,cy-3,2,0,PI2);ctx.fill();
    ctx.restore();
  }
}

// =====================================================
// BOSS
// =====================================================
function spawnBoss(){
  bossActive={x:COLS/2|0,y:5,hp:15+level*2,maxHp:15+level*2,color:C.accent2,name:'BOSS',anim:0};
  bossHp=bossActive.hp; bossMaxHp=bossActive.maxHp;
  notify('⚠️ BOSS GELİYOR!','#ff0044');
}

function updateBoss(dt){
  if(!bossActive)return;
  bossActive.anim+=dt;
  bossActive.y+=dt*0.5;
  if(bossActive.y>ROWS-5)bossActive.y=5;
  if(invTimer<=0&&dist(snake[0].x,snake[0].y,bossActive.x,bossActive.y)<2)die('boss');
}

function hitBoss(dmg){
  if(!bossActive)return;
  bossActive.hp-=dmg;
  burst(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,bossActive.color,6);
  if(bossActive.hp<=0){
    burst(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,'#ffaa00',25);
    ring(bossActive.x*GS+GS/2,bossActive.y*GS+GS/2,'#fff',60);
    notify('🏆 BOSS YENİLDİ!','#ffaa00');
    bossActive=null; score+=50;
  }
}

function drawBoss(){
  if(!bossActive)return;
  const cx=bossActive.x*GS+GS/2,cy=bossActive.y*GS+GS/2,sz=GS*1.5;
  ctx.save();
  const g=ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,sz);
  g.addColorStop(0,'#ff88aa'); g.addColorStop(0.5,bossActive.color); g.addColorStop(1,'#880022');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(cx,cy,sz,0,PI2); ctx.fill();
  
  // Desen
  ctx.strokeStyle=bossActive.color+'44'; ctx.lineWidth=2;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(cx,cy,sz*(0.3+i*0.2),bossActive.anim+i*2,bossActive.anim+i*2+4);ctx.stroke()}
  
  // Gözler
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,7,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,7,0,PI2);ctx.fill();
  ctx.fillStyle=bossActive.color;
  ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,4,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,4,0,PI2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.2,2,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+sz*.3,cy-sz*.2,2,0,PI2);ctx.fill();
  
  // HP bar
  const bw=GS*6,bh=10,bx=cx-bw/2,by=cy-sz-20;
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#ff0044'; ctx.fillRect(bx,by,bw*(bossActive.hp/bossActive.maxHp),bh);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Orbitron'; ctx.textAlign='center';
  ctx.fillText(bossActive.name,cx,by-6);
  ctx.restore();
}

// =====================================================
// YEM TOPLAMA
// =====================================================
function collectFood(f){
  combo++; comboTimer=2;
  comboMult=combo>=12?10:combo>=8?5:combo>=5?3:combo>=3?2:1;
  score+=(f.sc||0)*comboMult;
  xp+=(f.xp||0);
  if(f.len>0)for(let i=0;i<f.len;i++)snake.push({...snake[snake.length-1]});
  if(f.hp>0)hp=Math.min(hp+f.hp,maxHp);
  if(bossActive)hitBoss(1);
  
  const cx=f.x*GS+GS/2,cy=f.y*GS+GS/2;
  burst(cx,cy,f.color,6);
  if(f.sc>0)floatText(cx,cy-10,'+'+f.sc*f.color,f.color);
  
  if(xp>=xpNext){xp-=xpNext;level++;xpNext=Math.floor(xpNext*1.2);speed=Math.min(15,6+level*.2);showUpgradeScreen()}
  if(combo>=3){shake(3,.15);if(combo>=5)ring(cx,cy,'#ffaa00',30)}
  if(level%5===0&&!bossActive&&level>1)spawnBoss();
  playTone(440+combo*20,.06);
}

function die(r){
  state='dead'; deadTimer=0; shake(8,.4); flash('#ff0044',.3);
  for(const s of snake)burst(s.x*GS+GS/2,s.y*GS+GS/2,C.accent,5);
  playTone(200,.25);
}

// =====================================================
// UPGRADE
// =====================================================
const UPGRADES=[
  {id:'speed',name:'Hız Artışı',desc:'+%15 hız',icon:'🏃',color:'#00ffcc'},
  {id:'hp',name:'Extra Can',desc:'+1 max can',icon:'❤️',color:'#ff44aa'},
  {id:'magnet',name:'Mıknatıs',desc:'Yemleri çeker',icon:'🧲',color:'#00ffcc'},
  {id:'score2x',name:'2x Puan',desc:'Çift puan',icon:'💯',color:'#ffaa00'},
  {id:'xp2x',name:'2x XP',desc:'Çift XP',icon:'📈',color:'#aa44ff'},
  {id:'shield',name:'Kalkan',desc:'5 sn dokunulmaz',icon:'🛡️',color:'#4488ff'},
  {id:'long',name:'Uzun Kuyruk',desc:'+3 uzunluk',icon:'📏',color:'#00ffcc'},
  {id:'fire',name:'Ateş Kuyruk',desc:'Düşman hasar',icon:'🔥',color:'#ff4400'}
];

function showUpgradeScreen(){
  state='levelup'; selectedUpgrade=0; upgradeChoices=[];
  const used=new Set();
  for(let i=0;i<3;i++){let idx;do{idx=rndInt(0,UPGRADES.length-1)}while(used.has(idx));used.add(idx);upgradeChoices.push(UPGRADES[idx])}
  shake(4,.2); flash('#ffaa00',.15); playTone(523,.12);
}

function applyUpgrade(u){
  upgrades.push(u.id);
  if(u.id==='speed')speed*=1.15;
  if(u.id==='hp'){maxHp++;hp++}
  if(u.id==='shield')invTimer=5;
  if(u.id==='long')for(let i=0;i<3;i++)snake.push({...snake[snake.length-1]});
  notify('⬆️ '+u.name+'!',u.color); playTone(660,.1);
}

// =====================================================
// SES (basit, hızlı)
// =====================================================
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d){
  if(!actx)return;
  try{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}
}

// =====================================================
// EFEKTLER
// =====================================================
function shake(i,d){shakeX=i;shakeY=i;shakeTimer=d}
function flash(c,d){flashColor=c;flashTimer=d}
function updateEffects(dt){
  if(shakeTimer>0){shakeTimer-=dt;const t=shakeTimer;shakeX=(Math.random()-.5)*shakeX*2*t;shakeY=(Math.random()-.5)*shakeY*2*t}
  else{shakeX=0;shakeY=0}
  if(flashTimer>0)flashTimer-=dt;
}

// =====================================================
// INPUT
// =====================================================
addEventListener('keydown',e=>{
  const c=e.code;
  if(c==='ArrowUp'||c==='KeyW'){e.preventDefault();if(state==='play')nextDir={x:0,y:-1};if(state==='menu')selectedBtn=(selectedBtn-1+3)%3}
  if(c==='ArrowDown'||c==='KeyS'){e.preventDefault();if(state==='play')nextDir={x:0,y:1};if(state==='menu')selectedBtn=(selectedBtn+1)%3}
  if(c==='ArrowLeft'||c==='KeyA'){e.preventDefault();if(state==='play')nextDir={x:-1,y:0};if(state==='levelup')selectedUpgrade=(selectedUpgrade-1+3)%3}
  if(c==='ArrowRight'||c==='KeyD'){e.preventDefault();if(state==='play')nextDir={x:1,y:0};if(state==='levelup')selectedUpgrade=(selectedUpgrade+1)%3}
  if(c==='Enter'||c==='Space'){
    e.preventDefault(); initAudio();
    if(state==='menu')startGame();
    if(state==='dead')startGame();
    if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play'}
  }
  if(c==='Escape'&&state==='dead')state='menu';
  if(c==='Digit1'&&state==='levelup'){applyUpgrade(upgradeChoices[0]);state='play'}
  if(c==='Digit2'&&state==='levelup'){applyUpgrade(upgradeChoices[1]);state='play'}
  if(c==='Digit3'&&state==='levelup'){applyUpgrade(upgradeChoices[2]);state='play'}
});

let touchStart=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,time:Date.now()}},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault(); if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y,d=Math.hypot(dx,dy);
  if(d<15){if(state==='menu')startGame();if(state==='dead')startGame();if(state==='levelup'){applyUpgrade(upgradeChoices[selectedUpgrade]);state='play'}}
  else if(d>30){if(Math.abs(dx)>Math.abs(dy))nextDir={x:dx>0?1:-1,y:0};else nextDir={x:0,y:dy>0?1:-1}}
  touchStart=null;
},{passive:false});

// =====================================================
// ANA DÖNGÜ
// =====================================================
function startGame(){
  state='play'; score=0; level=1; xp=0; xpNext=30;
  combo=0; comboTimer=0; comboMult=1;
  gameTime=0; upgrades=[]; enemies=[]; enemySpawnTimer=0;
  bossActive=null; foods=[]; particles=[]; notifications=[];
  genMap(); initSnake();
  for(let i=0;i<5;i++)spawnFood();
  notify('🎮 Başla!','#00ffcc');
}

let lastTime=0, fpsCounter=0, fpsTime=0, currentFps=0;

function loop(now){
  const dt=Math.min((now-lastTime)/1000,.05);
  lastTime=now;
  
  // FPS
  fpsCounter++;
  if(now-fpsTime>=1000){currentFps=fpsCounter;fpsCounter=0;fpsTime=now}
  
  // GÜNCELLE
  if(state==='play'){
    gameTime+=dt;
    updateSnake(dt);
    updateEnemies(dt);
    updateBoss(dt);
    foodTimer+=dt;
    if(foodTimer>=1.5){foodTimer=0;spawnFood()}
    // Mıknatıs
    if(upgrades.includes('magnet')){
      for(const f of foods){
        if(!f.alive)continue;
        const d=dist(snake[0].x,snake[0].y,f.x,f.y);
        if(d<5&&d>.5){const a=Math.atan2(snake[0].y-f.y,snake[0].x-f.x);f.x+=Math.cos(a)*.1;f.y+=Math.sin(a)*.1}
      }
    }
  }
  updateParticles(dt);
  updateEffects(dt);
  updateNotifications(dt);
  
  // ÇİZ
  ctx.save();
  const s=Math.min(innerWidth/W,innerHeight/H);
  ctx.setTransform(s,0,0,s,0,0);
  
  // Grid cache
  if(gridDirty)renderGrid();
  ctx.drawImage(gridCanvas,0,0);
  
  ctx.translate(shakeX,shakeY);
  
  if(state==='menu')drawMenu();
  else if(state==='play'){drawMap();drawFood();drawEnemies();drawBoss();drawSnake();drawParticles();drawHUD()}
  else if(state==='dead'){drawMap();drawParticles();drawDead()}
  else if(state==='levelup'){drawMap();drawFood();drawSnake();drawParticles();drawLevelUp()}
  
  drawNotifications();
  
  // Flash
  if(flashTimer>0&&flashColor){ctx.globalAlpha=flashTimer;ctx.fillStyle=flashColor;ctx.fillRect(-20,-20,W+40,H+40);ctx.globalAlpha=1}
  
  ctx.restore();
  requestAnimationFrame(loop);
}

// =====================================================
// MENÜ
// =====================================================
function drawMenu(){
  ctx.save();
  ctx.shadowColor=C.accent; ctx.shadowBlur=15;
  ctx.fillStyle=C.accent; ctx.font='900 46px Orbitron'; ctx.textAlign='center';
  ctx.fillText('SNAKE',W/2|0,100);
  ctx.fillStyle=C.accent2; ctx.shadowColor=C.accent2;
  ctx.fillText('EVOLUTION',W/2|0,145);
  ctx.restore();
  
  const lg=ctx.createLinearGradient(W/2-180,0,W/2+180,0);
  lg.addColorStop(0,C.accent+'00'); lg.addColorStop(.5,C.accent); lg.addColorStop(1,C.accent+'00');
  ctx.strokeStyle=lg; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(W/2-180,165); ctx.lineTo(W/2+180,165); ctx.stroke();
  
  ctx.fillStyle='#55667788'; ctx.font='12px Rajdhani'; ctx.textAlign='center';
  ctx.fillText('A ROGUELIKE SNAKE EXPERIENCE',W/2|0,180);
  
  const btns=['▶  PLAY','📖  HOW TO PLAY','⚙  SETTINGS'];
  const sy=230,sp=50,bw=260,bh=40;
  for(let i=0;i<3;i++){
    const y=sy+i*sp,sel=i===selectedBtn,bx=W/2-bw/2;
    ctx.save();
    if(sel){ctx.fillStyle=C.accent+'15';ctx.fillRect(bx,y-bh/2,bw,bh);ctx.fillStyle=C.accent;ctx.fillRect(bx,y-bh/2+4,2,bh-8)}
    ctx.strokeStyle=sel?C.accent+'44':'#fff1'; ctx.lineWidth=1;
    ctx.strokeRect(bx,y-bh/2,bw,bh);
    ctx.fillStyle=sel?C.accent:'#667788';
    ctx.font=(sel?'bold ':'')+'16px Rajdhani';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(btns[i],W/2|0,y|0);
    ctx.restore();
  }
  
  ctx.fillStyle='#333344'; ctx.font='12px monospace'; ctx.textAlign='left'; ctx.fillText('v2.0',10,H-10);
  ctx.fillStyle='#55667788'; ctx.font='12px Rajdhani'; ctx.textAlign='center';
  ctx.fillText('↑↓ Navigate  •  ENTER Select',W/2|0,H-20);
}

// =====================================================
// HUD
// =====================================================
function drawHUD(){
  ctx.save(); ctx.shadowColor=C.accent; ctx.shadowBlur=6;
  ctx.fillStyle=C.accent; ctx.font='bold 22px monospace'; ctx.textAlign='left';
  ctx.fillText('SCORE: '+score,15,28);
  ctx.restore();
  
  ctx.fillStyle='#888899'; ctx.font='15px Rajdhani'; ctx.textAlign='left';
  ctx.fillText('LVL '+level,15,48);
  
  const bw=100,bh=5,bx=55,by=43;
  ctx.fillStyle='#1a1a2a'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=C.accent; ctx.fillRect(bx,by,bw*(xp/xpNext),bh);
  
  for(let i=0;i<maxHp;i++){ctx.fillStyle=i<hp?'#ff44aa':'#333344';ctx.font='14px Arial';ctx.fillText('❤️',18+i*20,66)}
  
  if(combo>=3){
    ctx.save(); ctx.translate(W/2,48); ctx.shadowColor='#ffaa00'; ctx.shadowBlur=8;
    ctx.fillStyle='#ffaa00'; ctx.font='bold 22px Orbitron'; ctx.textAlign='center';
    ctx.fillText('COMBO x'+combo,0,0);
    if(comboMult>1){ctx.fillStyle='#fff';ctx.font='bold 14px Orbitron';ctx.fillText('('+comboMult+'x)',0,18)}
    ctx.restore();
  }
  
  if(bossActive){
    const bw2=W*.6,bh2=10,bx2=(W-bw2)/2,by2=H-35;
    ctx.fillStyle='#0a0a1a'; ctx.fillRect(bx2-2,by2-2,bw2+4,bh2+4);
    ctx.fillStyle='#ff0044'; ctx.fillRect(bx2,by2,bw2*(bossActive.hp/bossActive.maxHp),bh2);
  }
  
  ctx.fillStyle='#444'; ctx.font='10px monospace'; ctx.textAlign='right';
  ctx.fillText(currentFps+' FPS',W-10,14);
}

// =====================================================
// LEVEL UP
// =====================================================
function drawLevelUp(){
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.shadowColor='#ffaa00'; ctx.shadowBlur=15;
  ctx.fillStyle='#ffaa00'; ctx.font='bold 32px Orbitron'; ctx.textAlign='center';
  ctx.fillText('⬆ LEVEL UP! ⬆',W/2|0,95); ctx.restore();
  
  const cw=170,ch=200,sp=25,tw=3*cw+2*sp,sx=(W-tw)/2;
  for(let i=0;i<3;i++){
    const u=upgradeChoices[i],x=sx+i*(cw+sp),y=140,sel=i===selectedUpgrade;
    ctx.save();
    const cg=ctx.createLinearGradient(x,y,x,y+ch);
    cg.addColorStop(0,sel?'#1a1a3a':'#0e0e1e'); cg.addColorStop(1,sel?'#0a0a2a':'#060612');
    ctx.fillStyle=cg; ctx.fillRect(x,y,cw,ch);
    ctx.strokeStyle=sel?u.color+'88':'#fff1'; ctx.lineWidth=sel?2:1; ctx.strokeRect(x,y,cw,ch);
    if(sel){ctx.shadowColor=u.color;ctx.shadowBlur=12;ctx.strokeStyle=u.color+'44';ctx.strokeRect(x,y,cw,ch)}
    ctx.shadowBlur=0; ctx.fillStyle=u.color+'22'; ctx.fillRect(x,y,cw,25);
    ctx.font='36px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(u.icon,x+cw/2|0,y+60|0);
    ctx.fillStyle='#fff'; ctx.font='bold 14px Orbitron'; ctx.fillText(u.name,x+cw/2|0,y+95|0);
    ctx.fillStyle='#b0b0cc'; ctx.font='12px Rajdhani'; ctx.fillText(u.desc,x+cw/2|0,y+120|0);
    ctx.fillStyle=sel?'#fff':'#555566'; ctx.font='bold 13px monospace'; ctx.fillText('['+(i+1)+']',x+cw/2|0,y+ch-10|0);
    ctx.restore();
  }
  ctx.fillStyle='#888899'; ctx.font='13px Rajdhani'; ctx.textAlign='center';
  ctx.fillText('1-3 ile seç veya tıkla',W/2|0,H-45);
}

// =====================================================
// GAME OVER
// =====================================================
function drawDead(){
  deadTimer+=.016;
  const og=ctx.createRadialGradient(W/2,H/3,0,W/2,H/2,H);
  og.addColorStop(0,'rgba(20,0,0,0.85)'); og.addColorStop(1,'rgba(0,0,0,0.95)');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);
  
  ctx.save(); ctx.shadowColor='#ff0044'; ctx.shadowBlur=15;
  ctx.fillStyle='#ff0044'; ctx.font='900 40px Orbitron'; ctx.textAlign='center';
  ctx.fillText('GAME',W/2|0,90); ctx.fillStyle='#ff2d66'; ctx.fillText('OVER',W/2|0,130);
  ctx.restore();
  
  const lg=ctx.createLinearGradient(W/2-140,0,W/2+140,0);
  lg.addColorStop(0,'#ff004400'); lg.addColorStop(.5,'#ff0044'); lg.addColorStop(1,'#ff004400');
  ctx.strokeStyle=lg; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(W/2-140,148); ctx.lineTo(W/2+140,148); ctx.stroke();
  
  const items=[{l:'SCORE',v:score,c:C.accent},{l:'TIME',v:Math.floor(gameTime)+'s',c:'#888899'},{l:'LEVEL',v:level,c:'#ffaa00'},{l:'COMBO',v:'x'+combo,c:'#ffaa00'}];
  let y=175;
  for(const it of items){
    ctx.fillStyle='#556677'; ctx.font='11px Orbitron'; ctx.textAlign='right'; ctx.fillText(it.l,W/2-15,y);
    ctx.fillStyle=it.c; ctx.font='bold 15px monospace'; ctx.textAlign='left'; ctx.fillText(''+it.v,W/2+15,y);
    y+=26;
  }
  
  y+=15; ctx.strokeStyle='#fff1'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(W/2-110,y); ctx.lineTo(W/2+110,y); ctx.stroke();
  y+=18; ctx.fillStyle='#fff'; ctx.font='bold 13px Orbitron'; ctx.textAlign='center'; ctx.fillText('REWARDS',W/2|0,y);
  y+=22; ctx.fillStyle=C.accent; ctx.font='bold 16px monospace'; ctx.fillText('+'+level*15+' XP',W/2-55,y|0);
  ctx.fillStyle='#ffcc00'; ctx.fillText('+'+(score*.05|0)+' COIN',W/2+55,y|0);
  
  y=H-90;
  ctx.fillStyle=C.accent; ctx.font='bold 17px Rajdhani'; ctx.textAlign='center'; ctx.fillText('▶ PLAY AGAIN',W/2-90,y|0);
  ctx.fillStyle='#666677'; ctx.fillText('◀ MAIN MENU',W/2+90,y|0);
  ctx.fillStyle='#55667788'; ctx.font='11px Rajdhani'; ctx.fillText('ENTER: Tekrar  •  ESC: Menü',W/2|0,H-18);
}

// =====================================================
// BAŞLAT
// =====================================================
requestAnimationFrame(loop);
</script>
